body:
  text: 梁溪漫志卷四宋費衮撰東坡教人讀檀弓東坡教人讀檀弓山谷謹守其言傳之後學檀弓誠文章之模範凡為文記事常患意晦而辭不達語雖蔓衍而終不能發明惟檀弓或數句書一事或三句書一事至有兩句而書一事者語極簡而味長事不相涉而意脉貫穿經緯錯綜成自然之文此所以為可法也東坡識任德翁蜀人任孜字遵聖以學問氣節雄鄉里兄弟皆從老蘇游東坡所謂大任剛烈世無有疾惡如風朱伯厚者其後在京師有哭遵聖詩云老任况豪俊先子推輩行又云平生惟一子抱負珠在掌見之齠齓中巳有食牛量其子後立朝果著大節即德翁也東坡眼目髙觀人於齠齓間已能如此妙矣夫東坡西湖了官事柬坡鎮餘杭遇遊西湖多令旌旗導從出錢塘門坡則自湧金門從一二老兵泛舟絶湖而來飯于普安院徜徉靈隱天竺間以吏牘自隨至冷泉亭則据案剖決落筆如風雨分爭辨訟談笑而辦已乃與僚吏劇飲薄晚則乘馬以歸夾道燈火縱觀太守有老僧紹興末年九十餘幼在院為蒼頭能言之當是時此老之豪氣逸韻可以想見也東坡改和陶集引東坡既和淵明詩以寄潁濵使為之引潁濵屬藁寄坡自欲以晚節師範其萬一也其下云嗟夫淵明隱居以求志詠歌以忘老誠古之達者而才實拙若夫子瞻仕至從官出長八州事業見於當世其剛信矣而豈淵明之拙者哉孔子曰述而不作信而好古竊比於我老彭古之君子其取於人則然東坡命筆改云嗟夫淵明不肯為五斗粟一束帶見鄉里小人而子瞻出仕三十餘年為獄吏所折困終不能悛以陷大難乃欲以桑榆之末景自託於淵明其誰肯信之雖然子瞻之仕其出入進退猶可考也後之君子其必有以處之矣孔子曰述而不作信而好古竊比於我老彭孟子曰曾子子思同道區區之迹蓋未足以論士也此文今人皆以為潁濵所作而不知東坡有所筆削也宣和間六槐堂蔡康祖得此藁於潁濵第三子遜因録以示人始有知者東坡教人作文寫字葛延之在儋耳從東坡遊甚熟坡嘗教之作文字云譬如市上店肆諸物無種不有却有一物可以攝得曰錢而已莫易得者是物莫難得者是錢今文章詞藻事實乃市肆諸物也意者錢也為文若能立意則古今所有翕然並起皆赴吾用汝若曉得此便㑹做文字也又嘗教之學書云世人寫字能大不能小能小不能大我則不然胸中有箇天來大字世間縱有極大字焉能過此從吾胸中天大字流出則或大或小惟吾所用若能了此便㑹作字也嘗為作龜冠詩送其行葛以語胡蒼梧蒼梧為記之此大匠誨人之妙法學者不可不知也東坡謫居中勇於為義陸宣公謫忠州杜門謝客惟集藥方蓋出而與人交動作言語之際皆足以招謗故公謹之後人得罪遷徙者多以此為法至東坡則不然其在惠州也程正輔為廣中提刑東坡與之中外凡惠州官事悉以告之諸軍闕營房散居市井窘急作過坡欲令作營屋三百間又薦都監王約指使藍生同幹惠州納秋米六萬三千餘石漕符乃令五萬以上折納見錢坡以為嶺南錢荒乞令人户納錢與米並從其便博羅大火坡以為林令在式假不當坐罪又有心力可委欲專牒令修復公宇倉庫仍約束本州科配惠州造橋坡以為吏孱而胥橫必四六分分了錢造成一座河樓橋乞選一健幹吏來了此事又與廣帥王敏仲書薦道士鄧守安令引蒲澗水入城免一城人飲鹹苦水春夏疾疫之患凡此等事多涉官政亦易指以為恩怨而坡奮然行之不疑其勇於為義如此謫居尚爾則立朝之際其可以死生禍福動之哉東坡緣在東南東坡平生宦游多在淮浙間其始通守餘杭後又為守杭人樂其政而公樂其湖山嘗過夀星院恍然記若前身游厯者其於是邦每有朱仲卿桐鄉之念謫居於黃凡五年移汝既去黃夜行武昌山上回望東坡聞黃州鼓角凄然泣下賦詩云黃州鼓角亦多情送我南來不辭逺尋上章乞居常州其後謝表有買田陽羡誓畢此生之語在禁林與胡完夫蔣穎叔酬唱皆以卜居陽羡為言晚自儋北歸愛龍舒風土欲居焉乃令郡之隱士李惟熙買田以老已而得子由書言桑榆末景忍復離别遂欲北還潁昌作書與惟熙云然某緣在東南終當㑹合願君志之未易盡言也至儀真乃聞忌之者猶欲攻擊遂不敢兄弟同居竟居毗陵以薨緣在東南之語乃爾明驗古之偉人自能前知所謂有開必先者不假數術也東坡卜居陽羡建中靖國元年東坡自儋北歸卜居陽羡陽羡士大夫猶畏而不敢與之游獨士人邵民瞻從學於坡坡亦喜其人時時相與杖䇿過長橋訪山水為樂邵為坡買一宅為錢五百緡坡傾囊僅能償之卜吉入新第既得日矣夜與邵步月偶至一村落聞婦人哭聲極哀坡徙倚聽之曰異哉何其悲也豈有大難割之愛觸於其心歟吾將問之遂與邵推扉而入則一老嫗見坡泣自若坡問嫗何為哀傷至是嫗曰吾家有一居相傳百年保守不敢動以至於我而吾子不肖遂舉以售諸人吾今日遷徙來此百年舊居一旦訣别寧不痛心此吾之所以泣也坡亦為之愴然問其故居所在則坡以五百緡所得者也坡因再三慰撫徐謂之曰嫗之舊居乃吾所售也不必深悲今當以是屋還嫗即命取屋劵對嫗焚之呼其子命翌日迎母還舊第竟不索其直坡自是遂還毗陵不復買宅而借顧塘橋孫氏居暫憩焉是嵗七月坡竟歿于借居前輩所為類如此而世多不知獨吾州傳其事云東坡懶版東坡北歸至儀真得暑疾止于毗陵顧塘橋孫氏之館氣寖上逆不能卧時晉陵邑大夫陸元光獲侍疾卧內輟所御懶版以獻縱橫三尺偃植以受背公殊以為便竟據是版而終後陸君之子以屬蒼梧胡德輝為之銘曰參沒易簀由殪結纓斃而得正匪死實生堂堂東坡斯文棟梁以正就木猶不忍僵昔我邑長君先大夫侍聞夢奠啓手舉扶木君戚施匪屏匪几詒萬子孫無曰不祥之器毗陵東坡祠堂記東坡自黃移汝上書乞居常其後謝表有買田陽羡誓畢此生之語在禁林與胡完夫蔣穎叔唱和有云惠山山下土如濡陽羡溪頭米勝珠賣劍買牛吾欲老殺雞為黍子來無又云雪芽我為求陽羡乳水君應餉惠山晚自儋耳北還﨑嶇萬里徑歸南蘭陵以殁蓋出處窮達三十年間未嘗一日忘吾州者而郡無祠宇奠謁之所邦人以為闕文乾道壬辰太守朝彊伯子健來始築祠於郡學之西塑東坡像其中又於士夫家廣摹畫像或朝服或野服列於壁間而朝侍郎公武為之記其略曰公武聞諸世父景迂生崇寧間賊臣擅國顛倒天下之是非人皆畏禍莫敢莊語公之葬也少公黃門銘其壙亦非實録其甚者以賞罰不明罪元祐以改法免役壞元豐指溫公才智不足而謂公之斥逐出其遺意稱蔡確謗讟可赦而謂公之進用自其遷擢章子厚之賊害忠良而謂公與之友善林希之詆誣善類而云公嘗汲引之嗚呼若然則公之上清儲祥忠清粹德二碑及諸奏議著述皆誕謾歟公武因子健之請伏自思念嵗月滋久耆舊日益淪喪存者皆邈然後進則緒言將零落不傳於是不敢以不能為解而輒載其事惟公當元祐時起於謫籍登金門玉堂極禮樂文章之選及章蔡竄朋黨於嶺表而公獨先朝廷追復黨人官爵而公獨後立朝本末彰明較著如此豈有他哉昔陳仲弓送中常侍父之葬非以為賢從者詈楚公子曰𨽻也不力非以為不肖皆有為而發豈少公之意或出於此非耶後世不知其然惟斯言是信則為盛德之纍大矣因述景迂生之語俾刻之樂石庶異日網羅舊聞者有考記成彊伯刻石為二碑一置之郡齊一置之陽羡洞靈觀用杜元凱之法蓋欲俱傳不朽其措意甚美然東坡公之名節固自萬世不磨矣武臣獻東坡啓東坡帥定武有武臣狀極朴陋以啓事來獻坡讀之甚喜曰竒文也客退以示幕客李端叔問何者最為佳句端叔曰獨開一府收徐庾於幕中並用五材走孫吳於堂下此佳句也坡曰非君誰識之者端叔笑謂坡曰視此郎眉宇間決無是語得無假諸人乎坡曰使其果然固亦具眼矣即為具召之與語甚歡一府皆驚竹坡老人周少隱紫芝聞之李端叔嘗記其事東坡戴笠東坡在儋耳一日過黎子雲遇雨乃從農家借篛笠戴之著屐而歸婦人小兒相隨爭笑邑犬羣吠竹坡周少隱有詩云持節休誇海上蘇前身便是牧羊奴應嫌朱紱當年夢故作黃冠一笑娛遺迹與公歸物外清風為我襲庭隅憑誰喚起王摩詰畫作東坡戴笠圖今時亦有畫此者然多俗筆也東坡荔支詩柬坡食荔支詩有云雲山得伴松檜老霜雪自困樝梨粗常疑上句似泛此老不應爾後見習閩廣者云自福州古田縣海口鎮至于海南凡宰上木松檜之外悉雜植荔子取其枝葉蔭覆彌望不絶此所以有伴松檜之語也東坡用事對偶精切東坡詞源如長江大河洶涌奔放瞬息千里可駭可愕而於用事對偶精妙切當人不可及如張子野買妾詩全用張氏事祭徐君猷文全用徐氏事送李方叔下第詩用古戰場日五色皆當家事殆如天成徐君猷孟亨之皆不飲作詩戲之用徐邈孟嘉飲酒事仍各舉當時全語以為對其通守餘杭日答髙麗使私覿狀云歸時事於宰旅方勞逺勤發私幣於公卿亦蒙見及發幣一事非外夷使者致饋之故實乎退之東坡用先後語退之南山詩云或齊若友朋或差若先後人多不知先後之義練塘洪慶善吏部興祖引前漢志云見神於先後宛若其注云兄弟妻關中呼為先後豫觀東坡徐州謝上表云信道直前曾無坎井之避立朝寡助誰為先後之容或疑先後不可對坎井蓋不知亦出於此也東坡文效唐體柬坡之文浩如河漢濤瀾奔放豈區區束縳於隄防者而作徐君猷祭文及徐州鹿鳴燕詩序全用四六效唐人體而益工蓋以文為戲耶東坡録沿流館詩東坡在翰林被㫖作上清儲祥宫碑哲宗親書其額紹聖黨禍起磨去坡文命蔡元長别撰玉局遺文中有詩云淮西功德冠吾唐吏部文章日月光千載斷碑人膾炙不知世有段文昌其題云紹聖中得此詩於㳂流館中不知何人作也戲録之以益篋笥之藏此詩乃東坡自作蓋寓意儲祥之事特避禍故託以得之味其句法則可知矣石屋洞題名臨安石屋洞崕石上有題名二十五字云陳襄蘇頌孫奕黃灝曾孝章蘇軾同遊熙寧六年二月二十一日內東坡姓名磨去僅存髣佛蓋崇寧黨禍時也栁展如論東坡文東坡歸自海南遇其甥栁展如閎出文一卷示之曰此吾在嶺南所作也甥試次第之展如曰天慶觀乳泉賦詞意髙妙當在第一鍾子翼哀詞别出新格次之他文稱是舅老筆甥敢優劣邪坡歎息以為知言展如後舉似洪慶善慶善跋東坡帖具載其語貶所敬蘇黃元祐黨禍烈於熾火小人交扇其熖傍觀之君子深畏其酷惟恐黨人之塵㸃汙之也而東坡之在儋儋守張中事之甚至且日從叔黨棋以娛東坡洎張解官北歸坡凡三作詩送之魯直之在戎戎守彭知微每遣吏李珍調護其逆旅之事無不可人意當是之時而二守乃能如此其義氣可書張竟以此坐謫云昌化盛事東坡眉人貶昌化任德翁亦眉人後亦貶昌化張才叔贈德翁詩云儋耳百年經僻陋眉山二老繼驅除德翁和云身投魑魅家何在澤逮昆蟲罪未除蘇任兩公同鄉里同貶所大節相望顧儋耳獨何幸也侍兒對東坡語東坡一日退朝食罷捫腹徐行顧謂侍兒曰汝輩且道是中有何物一婢遽曰都是文章坡不以為然又一人曰滿腹都是識見坡亦未以為當至朝雲乃曰學士一肚皮不入時宜坡捧腹大笑梁溪漫志卷四
