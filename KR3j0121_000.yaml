body:
  text: 梁溪漫志雜家類三雜説之屬提要臣等謹按梁溪漫志十卷宋進士費衮撰衮字補之無錫人其書雜記見聞詳貫賅洽足資考證之助在宋人説部中頗稱精審其論史事數條尤多前人所未發如謂漢田蚡唐崔器之得疾涉於禍福報應史家當削而不書辨漢髙祖即臥內奪韓信軍為不足信論姚崇序進郎吏明皇不應為怠心之萌皆具有特識非托拾陳言取盈卷帙者可比按宋史藝文志載是書作一卷而此本卷首附開禧初國史院牒文已作十卷則宋志一字誤也乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀梁溪漫志序前輩之學不徒為空言也施之於用然後為言故掌制作命則言抗疏論諫則言知人安民矢謨則言舍是而有言焉所謂垂世立教者則亦不得已云爾豫生無益於時其學迂濶無所可用暇日時以所欲言者記之於紙嵗月寖久積而成編因目以漫志嗟夫竟何謂哉顧非有用之言且非有所不得已譬之候蟲逢秋自吟自止識者當亦為之歎笑耶紹熙三年十二月二十日梁溪費衮補之序近見費補之衮梁溪漫志紹興間韓蘄王自樞密使就第放浪湖山匹馬數童飄然意行一日至湖上遙望蘇仲虎尚書宴客蘄王徑造其席喜甚醉歸翌日折簡謝餉以羊羔且作二詞手書以贈蘇公緘藏之親題其上云二闋三紙勿亂動淳熙丁未蘇公之子夀父山丞太府攜以示蘄王長子莊敏公莊敏以示豫字畫殊傾欹然其詞乃林下道人語莊敏云先人生長兵間不解書晚年乃稍能之耳嘉定改元莊敏公次子樞密承旨帶御器械以二詞石本見示益信梁溪之説但詞中一二字不同耳昔人有競病之詩及塞北煙塵之句雖皆可稱殆未有超然物外如蘄王之曠達者也中元日四門樓鑰書國史實録院牒國子免解費進士勘會本院恭奉聖旨指揮編修高宗皇帝孝宗皇帝光宗皇帝三朝正史今有合申請事開具下項內一項一今來編修三朝正史合要文臣卿監武臣刺史以上宗室大將軍應生前事迹墓志行狀碑志奏議文集及前後所得聖語并御筆文字等參照修纂及官雖卑或事有可紀耆亦合立傳併乞朝廷劄下諸路轉運司行下所管州軍監縣鎮嚴限子細搜訪抄録申發赴院以慿參修施行伏候指揮六月十七日三省同奉聖旨依劄付院當院今訪問得國子免解費進士衮有所著梁溪漫志十卷須至公文牒請遵從已降聖旨指揮抄録前項所要文字點對無差漏申發赴院以備參修使用不請違滯故牒開禧二年二月日牒
