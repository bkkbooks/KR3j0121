body:
  text: 梁溪漫志卷十宋費衮撰陸鴻漸為茶所纍人不可偏有所好往往為所嗜好掩其他長如陸鴻漸本唐之文人達士特以好茶人止稱其能品泉别茶爾所著書甚多曰君臣契三卷源解三十卷江表四姓譜十卷南北人物志十卷吳興歷官記三卷潮州刺史記一卷茶經三卷占夢三卷然世所傳者特茶經他書皆不傳蓋為茶經所掩也鞏縣有瓷偶人號陸鴻漸買十茶器得一鴻漸市人沽茗不利輒灌注之鴻漸嗜茶而終遭困辱嗜好之弊至此獨不可笑乎范信中范寥字信中蜀人其名字見山谷集負才豪縱不羈家始饒給從其叔分財一月輒盡之落莫無聊賴欲應科舉人曰若素不習此奈何范曰我第往即以成都第二名薦送益縱酒遂毆殺人因亡命改姓名曰花但石蓋增損其姓字為廋語遂匿傍郡為園丁久之技癢不能忍書一詩於亭壁主人見之愕然曰若非園丁也贈以白金半笏遣去乃往稱進士謁一巨公忘其人巨公與語竒之延致書室教其子范暮出歸輒大醉復毆其子其家不得已遣之遂椎髻野服詣某州持狀投太守翟公思求為書吏翟公視其所書絶精妙即留之時公巽參政立屏後翟公視事退公巽前問曰適道人何為者翟公告以故公巽曰某觀其眸子非常人宜詰之乃召問所以來范悉對以實問習何經曰治易書翟公出五題試之不移時而畢文理高妙翟公父子大驚敬待之已而歸南徐置之郡庠以錢百千畀州教授俾時賙其急闕且囑之曰無盡豫之彼一日費之矣頃之翟公得教授者書云自范之留一學之士為之不寧已付百千與之去不知所之矣未幾翟公捐館於南徐忽有人以袖掩靣大哭排闥徑詣繐帷閽者不能禁翟之人皆驚公巽默念此必范寥哭而出果范也相勞苦留之宿天明則翟公几筵所陳白銀器皿蕩無孑遺訪范亦不見時靈幃婢僕門內外人亦甚多皆莫測其何以能擕去而人不之見也遂徑往廣西見山谷相從久之山谷下世范乃出所擕翟氏器皿盡貨之為山谷辦後事已而往依一尊宿忘其名師素知其人問曰汝來何為曰欲出家耳能斷功名之念乎曰能能斷色欲之念乎曰能如是問答者十餘反遂名之曰恪能居無何尊宿死又往茅山投落托道人即張懷素也有妖術吕吉甫蔡元長皆與之往來懷素每約見吉甫則於香合或茗具中見一圓藥跳擲久之旋轉於桌上漸成小人已而跳躍於地駸駸長大與人等視之則懷素也相與笑語而去率以為常時懷素方與吳儲侔謀不軌儲侔見范愕然私謂懷素曰此怪人胡不殺之范已密知之矣一夕儲侔又與懷素謀懷素出觀星象曰未可范微聞之明日乃告之曰某有祕藏遁甲文字在金陵此去無多地願往取之懷素許諾范既脫欲詣闕而無裹糧湯侍郎東野時為諸生范走謁之值湯不在其母與之萬錢范得錢徑走京師上變時蔡元長趙正夫當國其狀止稱右僕射而不及司空左僕射蓋范本欲併告蔡也是日趙相偶謁告蔡當筆據案問曰何故忘了司空耶范抗聲對曰草茅書生不識朝廷儀蔡怒目嘻笑曰汝不識朝廷儀即下吏捕儲侔等獄具懷素將就刑范往觀之懷素謂曰殺我者乃汝耶范笑曰此朝廷之福爾又謂刑者曰汝能碎我腦蓋乃可殺我刑者以刃斫其腦不入以鐵椎擊之又不碎然竟不能神卒與儲侔等坐死洎第賞范曰吾不能知此湯東野教我也遂急逮湯湯惶駭不測其由既至白身為宣德郎御史臺主簿范但得供備庫副使勾當在京延祥觀後為福州兵鈐其人縱橫豪俠蓋蘇秦東方朔郭解之流云投水屈原有士人嘗以非辜至訟庭守不直之士人憤悶大聲稱屈守怒曰若為士乃敢爾為我屬對不能且得罪因唱曰投水屈原真是屈士人應聲曰殺人曾子又何曾守曰吾句有二屈字而汝句尾乃曾音層字汝之不學明矣顧何所逃罪邪士人笑曰此乃使君不學爾按屈姓流俗皆如字呼而屈到屈原皆九勿切使君嘗研究否守慙釋遣之祠廟之訛祠廟之訛甚多彭郎小姑固世所共知其最可笑者鄴中有西門豹祠乃於神像後出一豹尾舂陵有象祠乃塑一象垂鼻輪囷流俗之無知亦已甚矣伏波崔府君廟後漢馬文淵路博德皆嘗為伏波將軍又皆有功於嶺南海上有伏波祠古今所傳莫能定於一東坡作碑謂兩伏波均當廟食政和中因修九域圖志以睢陽雙廟為例令祀兩神蓋義理當於人心雖是時正諱東坡議論而亦不能廢也紹興乙卯董令升舍人棻為吏部郎以嘗持節廣西乞兩廟封爵一等詔從之然不知政和未並建廟以前竟孰當此血食也磁州有崔府君廟邦人嚴奉又京師北郊亦建廟中興駐蹕臨安加封真君築祠西湖上像設尤嚴或以其神為崔子玉非也神乃唐正觀中相州滏陽令遷蒲州刺史有惠愛於滏陽後為磁州民為立祠殁因葬其地本朝景祐二年七月詔曰眷是靈祠本於外服且以惠存滏邑恩結蒲人生著令猷沒司幽府案求世系雖史逸其傳尸祝王官而民賴其福崔府君宜特封護國顯應公有司遣官祭告然迄莫知其名字臨安旌忠廟紹興初張楊郭三大將建永樂三侯廟於臨安柴垜橋之東賜額旌忠各有封爵三侯者高將軍名永能程閣使名博古景崇儀名思誼高西州人世總蕃落邊人賴以安程河南人文簡其諸父也世業儒獨程以材武奮景普州人其大父訥有將材西人畏之永樂之役徐德占拔一時名將以行故三侯皆被選程首與敵戰殁高以䇿不用知必敗以弓弦絶脰死景入説賊被害舊廟建於延安之膚施縣有古雍施巨濟所作記云然今臨安新廟無復此碑而故老猶能誦其略三侯既廟食西邊每王師與敵戰屢施隂助諸將來東南討方臘亦著靈異故相與作廟於臨安廟初成有匠者醉溺於庭立死時時有三蛇出沒殿廡或行庭下大者長尺許鱗鬛齒爪悉具通身小方勝如金色其次長八九寸又其次稍小自首至尾其脊皆有金線身紋盡同惟次者尾稍禿天宇晴明變化數百往來遊戲於庭卉芭蕉間或緣幡而上近嵗乃不復出人或謂為陜西三龍王蓋三侯以節死其英魂忠魄變幻飛潛無所不可東坡銘張龍公云相彼幻身何適不通地行為人天飛為龍惠於有生我則從之信哉今遷廟於豐樂橋之東北故覺苑寺基也二相公廟乞夢京師二相公廟世傳子遊子夏也靈異甚多不勝載於舉子問得失尤應答如響蓋至今人人能言之大觀間先大父在太學有同舍生將赴廷試乞夢於廟夜夢一童子傳言云二相公致意先輩將來成名在二相公上覺而思之子遊子夏夫子高弟也吾成名在其上必居巍科無疑竊自喜暨唱名乃以雜犯得州文學大憤悶失意私念二相公之靈不宜有此沈吟終夜忽駭笑曰論語云文學子遊子夏今果居其上乎詰旦以語同舍皆大笑曰神亦善謔如此哉蜀僧東明寺題詩蔡元長南遷道出長沙卒於城南五里東明寺遂草殯於寺之觀音殿後有蜀僧遊方過之慨然因題詩於壁曰三十年前鎮益州紫泥丹詔鳯池遊大鈞播物心難一六印懸腰老未休佐主不能如傅説知幾那得似留侯功名富貴今何在寂寂招提一土丘𣑽志詩山谷以茅季偉事親引𣑽志翻襪之句人喜道之豫嘗見𣑽志數頌詞朴而理到今記於此其一曰欺誑得錢君莫羡得來却是輸他便來往報答甚分明只是換頭不識面又曰多置莊田廣修宅四鄰買盡猶嫌窄雕墻峻宇無歇時幾日能為宅中客又曰造作莊田猶未已堂上哭聲身已死哭人盡是分錢人口哭元來心裏喜又曰衆生頭兀兀常往無明窟心裏為欺謾口中佯念佛又曰世無百年人強作千年調打鐵作門限鬼見拍手笑又曰勸君休殺命背面彼生嗔喫他他喫汝循環作主人又曰他人騎大馬我獨跨驢子回顧擔柴漢心下較些子又曰家有𣑽志詩生死免入獄不論有益事且得耳根熟白紙書屏風客來即與讀空飯手捻鹽亦勝設酒肉王虛中王虛中名日休龍舒人早為太學諸生傳注經子數十萬言然不利於場屋晚以特奏名廷試不用條對式但如科舉答䇿坐是竟不得官獨好佛著淨土文直指西方淨土慧辨了然觀者起敬或自立或勸人裒金走建安刋淨土文板踰二十副願力洪深修行尤精苦諷誦禮拜夜以繼晝館於廬陵某通守家一日謁通守謂之曰某去矣以後事纍公通守愕然虛中乃著白衫詣佛堂合掌念佛頃之立化於植木矣傾城縱觀纍日不能遏通守亦明眼人乃命具棺指虛中謂人曰先生平時照了諸妄坐卧自如今請先生卧即舉而入棺豫舊見建安陳應行季陸道此後訪南北山雲遊諸僧欲問其歲月并通守姓名漫無知者記其大略如此惠歷寺輪藏臨江軍惠歷寺初造輪藏成寺僧限得千錢則轉一匝有營婦喪夫家極貧念為轉藏以資冥福纍月辛苦收拾隨聚隨費終不滿一千迫於貧乏無以自存嫁有日矣而此心眷眷不能已遂擕所聚之金號泣藏前擲金於地輪藏自轉闔寺駭異自是不復限數云江東叢祠江東村落間有叢祠其始巫祝附託以興妖里民信之相與營葺土木寖盛有惡少年不信一夕被酒入廟肆言詆辱巫駭愕不知所出聚謀曰吾儕為此祠勞費不資一旦為此子所敗遠邇相傳則吾事去矣逮夜共詣少年以情告曰吾之情狀若固知之儻因成吾事當以錢十萬謝若少年喜問其故因教之曰汝質明復入廟詈辱如前凡廟中所有酒殽舉飲啖之斯須則偽為受械祈哀之狀庶印吾事今先賂汝以其半少年許諾受金翌日果復來廟廷袒裼嘂呼極口醜詆不可聞廟傍民大驚觀者踵至少年視神像前方祭賽羅列即舉所祀酒悉飲之以至殽饌無孑遺旋俯躬如受縶者叩頭謝過忽黑血自口涌出七竅皆流即仆地死里人益神之即日喧傳傍郡祈禳者雲集廟貌繪繕極嚴巫所得不勝計越數月其黨以分財不平詣郡反告乃巫置毒酒中殺其人捕治引伏魁坐死餘分𨽻諸郡靈響訖息作賦贖罪舊傳滕達道未遇時與諸生講學於僧舍主僧出諸生夜盜其犬而烹之事聞有司欲治其罪滕公為丐免守素聞其能賦因諭之曰如能為盜犬賦則將釋之滕公即口占其辭曰僧既無狀犬誠可偷輟藍宫之夜吠充綘帳之晨羞摶飯引來猶掉續貂之尾索綯牽去難回顧兔之頭守大笑即置不問今人相傳為口實紹興初豫妻之祖強公叔章通守黻為臨安録事參軍時豫祖母之弟陳公宗卿侍郎之淵為府學教授適學帑被盜邏者夜搜溝中而所盜金在焉府學生黃其姓者立於傍遂録送府繫之獄生自辨數然蹤迹頗疑似強公與府司户毛季中謀曰行之則汙辱士類為學校羞矣因引滕公作賦故事言於府乞俾之試府主張公如瑩尚書澄許之俾詣都廳試以取傷廉為題生倉皇不成文強公潛代為之其一聯云門人竊屨何傷孟子之賢同舍誣金始見直生之量張公見之喜即於賦後判云黃某盜金情狀頗著曹官試賦文理稍佳免送所司押歸本學聊從五等薄示諸生遂以付學陳公亦隂縱之以此見前輩之盛德持心皆近厚也俚語盜智俚語謂盜雖小人智過君子此語固可鄙笑然盜之姦詐實有出人意表者可誅也高郵民尉九疾足善走日馳數百里氣勢猛壯非得樹不能止為盜寖淫傍郡淮人皆苦之其居高郵闤闠間日則張食肆夜則為盜一日晨起方坐肆間有道人來食湯餅食已邀尉至間處呼為師父且拜之尉訝之曰何為者道人曰某亦有薄技然出師下遠甚聞楚州城外有一富家今願偕師行庶慿藉有所獲尉許諾使之先往道人即馳去逮夜尉張燈閉肆怒其僕執事不謹毆之僕紛拏不服乃呼邏者廂官俱繫之須翌日送郡尉密謂邏曰吾與若厚且家於此必不竄若姑縱吾歸明當復至也邏許之尉得釋即踰城馳二百里至楚城外鼕鼕方二鼓矣道人果先在相見喜甚尉自屋忩入約道人伺於外既入其室視所藏金珠錦綺爛然溢目即以百縑擲出道人分兩囊負之斯須尉復由屋忩出道人思天下惟尉為愈已不如殺之即拔刃斷其首隨墜地視之則紙所為也尉由他户復馳歸高郵就逮天方辨色道人負重行遲為追者所及執送楚州獄自列與尉同為盜狀州為檄高郵高郵報云是夕尉自與僕有訟方繫有司無從可為盜也道人終始墮其計卒自伏辜尉狡險萬端有術以自將屢為穿窬官卒不能捕又有士夫調官都下所居逆旅前張茗坊與染肆相直士無事日憑茶几閲過者一日見數人往來其前數四若睥睨染肆者殊訝之一夫忽前耳語曰某輩經紀人也欲得此家所暴縑帛告官人勿言士曰此何預吾事而肯饒舌邪其人拱謝而退士私念彼所染物皆高揭於通衢之前白晝萬目共覩彼有術可竊則真黠盜也因諦觀之但見其人時時經過或左或右漸久漸疏薄暮則皆不見士笑曰彼妄人果紿我即入房將索飯則其室虛矣梁溪漫志卷十
