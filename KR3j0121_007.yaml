body:
  text: 梁溪漫志卷七宋費衮撰作詩押韻作詩押韻是一竒荆公東坡魯直押韻最工而東坡尤精於次韻往返數四愈出愈竒如作梅詩雪詩押暾字義字在徐州與喬太博唱和押粲字數詩特工荆公和義字數首魯直和粲字數首亦皆傑出蓋其胸中有數萬卷書左抽右取皆出自然初不著意要尋好韻而韻與意會語皆渾成此所以為好若拘於用韻必有牽強處則害一篇之意亦何足稱坡在嶺外和淵明懷古田舍詩云休間等一味妄想生愧靦自注云淵明本用𬗟字今聊取其同音字和程正輔同遊白水巖詩云恣傾白蜜收五稜細斸黃土栽三丫自注云來詩本用䃁字惠州無書不見此字所出故且從木奉和且東坡欲和此二韻似亦不難矣然才覺牽合則寧捨之不以是而壞此篇之全意也後人不曉此理才到和韻處以不勝人為耻必劇力冥搜縱不可使亦須強押正如醉人語言全無倫類可以一笑也詩人詠史詩人詠史最難須要在作史者不到處别生眼目正如斷案不為胥吏所欺一兩語中須能説出本情使後人看之便是一篇史贊此非具眼者不能自唐以來本朝詩人最工為之如張安道題歌風臺荆公詠范增張良揚雄東坡題醉眠亭雪溪乘興四明狂客荆軻等詩皆其見處高遠以大議論發之於詩汪遵讀秦史章碣題焚書坑二詩亦甚佳至如世所傳胡曾詠史詩一編只是史語上轉耳初無見處也青社許表民讀項羽傳作詩云眼中漫説重瞳子不見山河繞雍州其識見亦甚高遠作詩當以學作詩當以學不當以才詩非文比若不曾學則終不近詩古人或以文名一世而詩不工者皆以才為詩故也退之一出餘事作詩人之語後人至謂其詩為押韻之文後山謂曾子固不能詩秦少遊詩如詞者亦皆以其才為之也故雖有華言巧語要非本色大凡作詩以才而不以學者正如揚雄求合六經費盡工夫造盡言語畢竟不似詩作豪語詩作豪語當視其所養非執筆經營者可能馬子才作浩齋歌似亦豪矣反覆觀之雕刻工多意隨語盡豫謂孟子七篇乃真浩齋歌也歐公作廬山高氣象壯偉殆與此山爭雄非公胸中有廬山孰能至此郭功甫作金山行前輩多稱之雖極力造語而終窘邊幅信乎不可強也東坡論石曼卿紅梅詩東坡嘗見石曼卿紅梅詩云認桃無緑葉辨杏有青枝曰此至陋語蓋村學中體也故東坡作詩力去此弊其觀畫詩云論畫以形似見與兒童鄰賦詩必此詩定知非詩人此言可為論畫作詩之法也世之淺近者不知此理做月詩便説明做雪詩便説白間有不用此等語便笑其不著題此風晚唐人尤甚坡嘗作謝賜御書詩敘天下無事四夷畢服可以從容翰墨之意末篇云露布朝馳玉關塞捷書夜到甘泉宫又云文思天子師文母終閉玉關辭馬武小臣願對紫薇花試草尺書招贊普蓋因事諷諌三百篇之義也而或者笑之曰有甚道理後説到陜西獻捷此豈可與論詩若使渠為之定祗做一首寫字詩矣東坡放魚詩東坡和潛師放魚詩云况逢孟簡對盧同不怕校人欺子美或云校人乃欺子産非子美也豈少陵曾用校人事遂直以為子美邪豫按左氏杜預注子産一字子美東坡雪詩東坡雪詩五更曉色來書幌半夜寒聲落畫簷或疑五更自應有曉色亦何必雪蓋誤認五更字此所謂五更者甲夜至戊夜爾自昏達旦皆若曉色非雪而何此語初若平易而實新竒前人未嘗道也王逢原孔融詩王逢原孔融詩云戲撥虎鬚求不齧何如縮手袖中歸虛云坐上客常滿許下惟聞哭習脂按漢書融被害莫敢收者惟京兆脂習哭之而逢原乃作習脂讀書鹵莽不自點檢顧點檢孔文舉又嘗作嚴子陵詩譏切其隱文舉一世豪傑姦雄所憚而不敢動而顧使之歸子陵傲睨萬物帝王所不能臣而顧使之仕逢原之顛倒類如此可發後世君子之一笑潘邠老重陽句謝無逸嘗從潘邠老求近作邠老答曰秋來景物件件是佳句恨為俗氛所蔽昨日清卧聞攪林風雨聲欣然起題其壁曰滿城風雨近重陽忽催租人至遂敗意止此一句奉寄豫謂邠老之興正易敗也阮籍為竹林之遊王戎後至籍戲之曰俗物又復來敗人意戎笑曰如卿輩意復易敗耳此足見戎之高致若使豫聞秋聲得句方題壁間不知天地之大秋毫之小何催租人能敗邪賈島鍊敲推字至衝京尹節而不知此正得詩興之深者孟東野詩自六朝詩人以來古淡之風衰流為綺靡至唐為尤甚退之一世豪傑而亦不能自脫於習俗東野獨一洗衆陋其詩高妙簡古力追漢魏作者政如倡優前陳衆所趨奔而有大人君子垂紳正笏屹然中立此退之所以深嘉屢歎而謂其不可及也然亦恨其太過蓋矯世不得不爾當時獨李習之見與退之合後世不解此意但見退之稱道東野過實爭先譏誚東野反為退之所纍惜乎無有原其本意者也唐詩工靡麗唐人詩偏工靡麗雖李太白亦十句九句言婦人其後王建元稹韓偓之徒皆然如裴説者蓋未嘗以詩名至作寄邊衣詩則美麗可喜蓋當時詞章習尚如此故人人能道此等語也張文潛詩張文潛詩云春波一眼去鳬寒朝無咎稱之至東坡則云春風在流水鳬鴈先拍拍有無盡藏之春意詩人用字王平甫詩云山月入松金破碎其流蓋出於退之竹影金瑣碎之句然斜陽映竹則交加亂射若相瑣然故於瑣字為宜至於月華散漫松影在地則破字佳詩人用字皆不茍也杜少陵悶詩杜少陵作悶詩云捲簾惟白水隱几亦青山或曰人之好惡固自不同若使吾居此當卒以樂死矣豫以為不然人心憂鬱則所觸而皆悶其心和平則何適而非快青山白水本是樂處茍其中不快則慘淡蒼莽適足以增悶耳少陵又有詩云感時花濺淚恨别鳥驚心花鳥本是平時可喜之物而抑鬱如此者亦以觸目有感所遇之時異耳方言入詩方言可以入詩吳中以八月露下而雨謂之淋露九月霜降而雲謂之護霜竹坡周少隱有句云雨細方淋露雲疏欲護霜方言又有勃姑鴉舅槐花黃舉子忙促織鳴懶婦驚之類詩人皆用之大抵多吳語也明妃曲古今人作明妃曲多矣皆道其思歸之意歐陽公作兩篇語固傑出然大槩亦歸於幽怨白樂天有絶句云漢使若回煩寄語黃金何日贖蛾眉君王若問妾顔色莫道不如宫裏時其措意頗新然問黃金何日贖蛾眉則亦寓思歸之意要當言其志在為國和戎而不以身之流落為念則詩人之旨也陳子高觀寧王進史圖詩陳子高觀寧王進史圖作詩云汗簡不知天上事至尊新納壽王妃世稱其工然太露筋骨矣李義山驪山詩云平明每幸長生殿不從金輿祗壽王此則婉而有味春秋之稱也陳輔之論林和靖梅詩陳輔之云林和靖疏影橫斜水清淺暗香浮動月黃昏殆似野薔薇是未為知詩者豫嘗踏月水邊見梅影在地疏瘦清絶熟味此詩真能與梅傳神也野薔薇叢生初無疏影花隂散蔓烏得橫斜也哉張藝叟詞張藝叟詞云回首夕陽紅盡處應是長安人喜誦之樂天題嶽陽樓詩云春岸緑時連夢澤夕波紅處近長安蓋藝叟用此換骨也詩人相呼古者風俗淳厚朋友相呼以名至唐詩人猶以名相呼或直呼其行而不忌如杜子美贈李太白詩而云白也詩無敵之類是巳直呼其行者尤多今人聞呼其名其不怒罵者幾希至於文字間欲呼其行或繼之以丈或繼之以兄或繼之以官亦未嘗敢徒呼其行也禁東坡文宣和間申禁東坡文字甚嚴有士人竊擕坡集出城為閽者所獲執送有司見集後有一詩云文星落處天地泣此老已亡吾道窮才力漫超生仲達功名猶忌死姚崇人間便覺無清氣海內何曾識古風平日萬篇誰愛惜六丁收拾上瑶宫京尹義其人且畏纍己因隂縱之王左丞同名詩王履道左丞安中在京師見何人家亭上題字筆勢灑落不著姓而其名則安中也王驚問何人所書守者曰此何安中亦河朔人也王以與己名同恐人莫之辨戲書一詩於其後云蜀客更名緣好尚漢臣書姓為同官孟公自合名驚座子夏尤冝辨小冠益號文章緣兩李翃書制誥有諸韓二玄各自分南北付與時人子細看終篇皆用同名事云雍孝聞雍孝聞蜀人崇寧間廷試對䇿力詆時政闕失駁放後雖授以右列然卒不仕浪迹山林遂遇異人得道政和末變姓名為道士入內説法徽宗謂其得林靈素之半因賜姓木更名廣莫竟不知其為孝聞也孝聞嘗自詠云百萬人中隱一身深如勺水在滄溟獨醒自負賢人酒天濶難尋處士星照影自憐湖水碧高吟贏得蜀山青城南老樹如相問不枉翻空過洞庭二州酒名敘州本戎州也老杜戎州詩云重碧傾春酒輕紅擘荔枝今敘州公醖遂名以重碧東坡在齊安有春江緑漲蒲萄醅之句靖康初元韓子蒼舍人駒作守有旨添賜郡釀因名其庫曰蒲萄醅仍有詩云孤臣政術不堪論尚得君王賜酒尊父老異時傳盛事蒲萄醅熟記初元三處西湖三處皆有西湖東坡連鎮二州故表謝云入參兩禁每玷北扉之榮出典二邦輒為西湖之長晚謫惠州州有豐湖亦名西湖淳熙中祕書楊監萬里使廣東過惠遊豐湖賦詩云三處西湖一色秋錢塘潁水更羅浮東坡元是西湖長不到羅浮便得休毗陵二畫吾州天慶觀畫龍太平寺畫水勝絶之筆聞於天下凡四方來者道出毗陵必迂路而觀焉龍蓋姑蘇道士李懷仁所畫懷仁者酒豪不羈嘗呼龍松江之上狎而觀之遂畫龍入神品過毗陵天慶觀大醉索墨漿數斗曵苕帚裂巾袂濡墨號呼奮躑斯須龍成觀者失聲辟易懼將搏也懷仁後不知所終而好事者每呼畫工就龍模寫工運筆之際輒眩暈欲仆竟不能成觀者駭異水則郡人徐友畫清濟貫河一筆紆繞長數十丈不斷却立而觀濤瀾洶涌目為之眩仰首近之凜然若飛流之濺於面也郡人吳德輝因與客論近世名畫曰豫每至畫龍處輒諦玩彌時不能休乃賦古風曰道人龍中來醉與神物會寫兹蜿蜒質日月為冥晦崩翻江海姿素壁起濤瀨呼吸見雌雄抉石疑可碎蕭森殿隂古衆真儼飛斾注觀恐騰躍夜半失像繪飛光著明珠靈祕一何怪爛爛照甍棟那得久在外偷兒伺酣睡不怕嬰鱗害願言慎所託未用期一快淳熙戊戌楊誠齋為太守過太平寺為賦畫水長句曰太平古寺劫灰餘夕陽惟照一塔孤得得來看還不樂竹莖荒處破殿虛偶逢老僧聽僧話道是壁間留古畫徐生絶筆今百年祖師相傳妙天下壁如雪色一丈許徐生畫水才盈堵橫看側看只麼是分明是畫不是水中有清濟一線波橫貫萬里濁浪之黃河雷奔電卷儘渠猛獨清元自不隨它波痕盡處忽掀怒攪動一河秋水暮分明是水不是畫老眼向來元自誤佛廬化作金柂樓銀山雪堆風打頭是身飄然在中流奪得太乙蓮葉舟僧言此畫難再覔官歸江西却相憶并州剪刀剪不得鵝溪匹絹官莫惜貌取秋濤懸坐側是二畫為一郡之勝處而二公又形之賦詠間真足以傳不朽矣畫水東坡作文與可畫篔簹谷偃竹記云畫竹必先得成竹於胸中執筆熟視乃見其所欲畫者急起從之振筆直遂以追其所見如兔起鶻落少縱則逝矣與可之教豫如此此固作畫之法然不惟竹也畫水亦然坡嘗記蜀人孫知微欲於大慈寺壽寧院壁作湖灘水石四堵營度經嵗終不肯下筆一日倉皇入寺索筆墨甚急奮袂如風須臾而成作輸㵼跳蹙之勢洶洶欲崩屋也以此言之則心手相應之際間不容髮非若樓臺人物可以款曲運筆經日而成也豫嘗疑少陵王宰畫山水圖歌云十日畫一水五日畫一石能事不受相促迫王宰始肯留真迹此殆是言王宰之畫不易得當聽其纍日經營不可促迫之意爾其歌有云巴陵洞庭日本東赤岸水與銀河通中有雲氣隨飛龍舟人漁子入浦溆山木盡亞洪濤風觀其氣勢如此則筆所未到氣已吞食頃已為久若必俟十日乃成則其畫不足觀矣梁溪漫志卷七
