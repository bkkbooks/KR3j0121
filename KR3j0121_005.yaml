body:
  text: 梁溪漫志卷五宋費衮撰優孟孫叔敖歌史記載優孟言孫叔敖事曰楚相孫叔敖知其賢人也善待之病且死屬其子曰我死汝必貧困若往見優孟言我孫叔敖之子也居數年其子窮困負薪逢優孟與言曰我孫叔敖子也父且死時屬我貧困往見優孟優孟曰若無逺有所之即為孫叔敖衣冠抵掌談語嵗餘像孫叔敖楚王及左右不能别也莊王置酒優孟前為夀莊王大驚以為孫叔敖復生也欲以為相優孟曰請歸與婦計之三日而為相莊王許之三日後優孟復來王曰婦言何謂孟曰婦言慎無為楚相不足為也如孫叔敖之為楚相盡忠為亷以治楚楚王得以霸今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺因歌曰山居耕田苦難以得食起而為吏身貪鄙者餘財不顧恥辱身死家室富又恐受賕枉法為姦觸大罪身死而家滅貪吏安可為也念為亷吏奉法守職竟死不敢為非亷吏安可為也楚相孫叔敖持亷至死方今妻子窮困負薪而食不足為也於是莊王謝優孟乃召孫叔敖子封之寢丘史記所載如此豫嘗遊浮光叔敖即是郡期思縣人也期思今廢為鎮豫得漢延熹中所立碑書是事微有不同云病甚臨卒將無棺槨令其子曰優孟曾許千金貸吾孟楚之樂長與相君相善雖言千金實不負也卒後數年莊王置酒以為樂優孟乃言孫君相楚之功即慷慨髙歌涕泣數行闕一字投首王王心感動覺悟問孟孟具列對即求其子而加封焉子辭父有命如楚不忘亡臣社稷闕一字而欲有賞必於潘國下濕墝埆人所不貪遂封潘鄉潘即固始也而所載歌絶竒曰貪吏而可為而不可為亷吏而可為而不可為貪吏而不可為者當時有汙名而可為者子孫以家成亷吏而可為者當時有清名而不可為者子孫困窮披褐而賣薪貪吏常苦富亷吏常苦貧獨不見楚相孫叔敖亷潔不受錢味其詞語憤世疾邪含思哀怨過於慟哭比之史記所書逺甚聽者安得不感動也歐陽公集古録謂微斯碑後世遂不復知叔敖名饒又謂碑亦罕傳余以集録二十年間求之博且勤乃得之云史載禍福報應事史書載禍福報應事當示勸懲之意班固書田蚡殺魏其灌夫事其末云蚡疾一身盡痛若有擊者呼服謝罪上使視鬼者瞻之曰魏其與灌夫共守笞欲殺之竟死其意蓋謂蚡雖幸逃人戮鬼得而誅之矣故書之所以示戒也唐書載崔器議達奚珣罪抵死後器病叩頭云達奚尹訴於我三日卒夫珣之叛君附賊死有餘罪器守正據法尚何所訴又安能為正人之厲哉徒使逆徒用以藉口此等事削而不書可也古者居室皆稱宫古者居室貴賤皆通稱宫初未嘗分别也秦漢以來始以天子所居為宫矣禮記云父子異宫又云儒有一畝之宫環堵之室林子中在京口作詩寄東坡云欲喚無家一房客五雲樓殿鎖鼇宫而東坡和云卭頭莫喚無家客歸掃峩眉一畝宫蓋本諸此諸父大人伯叔父謂之諸父兄弟之子謂之猶子故皆可稱為父子二疏傅受乃廣之兄子而班固書曰即日父子俱移病又今人稱父為大人而此書受叩頭曰從大人議則諸父亦通稱猶孟子之所謂大人者蓋皆尊者之稱爾子者男子通稱子者男子之通稱若文字間稱其師則曰子某子復冠子字於其上者示特異於常稱曰吾所師者則某子云爾列子乃其門人所集故曰子列子公羊之書其弟子稱其為子公羊子至隱十一年稱子沈子何休注曰子沈子後師沈子稱子冠氏上者著其為師也不但言子曰者辟孔子也其不冠子者他師也陳後山以南豐瓣香稱為子曾子蓋用此法劉夢得自為傳乃加子於上者非是而今人承其誤亦多以自稱或稱其朋友皆失之矣前言往行有所感發士大夫多識前言往行豈獨資談柄為觀美蓋欲施之用也國初遣盧多遜使李國主還艤舟宣化口使人白國主曰朝廷重修天下圖經史館獨闕江東諸州願各求一本以歸國主亟令繕寫送與之於是多遜盡得其十九州之形勢屯戍逺近户口多寡以歸朝廷始有用兵之意熙寧中髙麗入貢所經州縣悉要地圖所至皆造送山川道路形勢險易無不備載至揚州牒州取地圖是時陳秀公守揚紿使者欲盡見兩浙所供圖倣其規模供造及圖至都聚而焚之具以事聞秀公之舉蓋因前事有所感發也老而能學曹孟德嘗言老而能學惟吾與袁伯業東坡云此事不獨今人不能古人亦自少也東坡以論語解寄文潞公書云就使無取亦足見其窮不忘道老而能學也豫竊謂年齒寖髙而能留意於學此固非易事然於其中亦自有味蓋老者更事既熟見理既明開卷之際迎刃而解如行舊路而見故人所謂溫故知新者人於少年讀書與中年晚年所見各不同其作文亦然故老而能學蓋自有以樂之也溫公論商鞅溫公論魏惠王有一商鞅而不能用使還為國害喪地七百里竄身大梁豫竊謂商鞅刻薄之術始能帝秦卒能亡秦使用之於魏其術猶是也孟子不逺千里而來惠王猶不能聽其言其妄庸可知矣溫公不責惠王以不聽孟子仁義之言而乃責其不用商鞅功利之説何耶公於此必有深意特豫未之曉爾辨髙祖卧內奪韓信軍史記西漢所書髙祖即卧內奪韓信軍事殊可疑且信為漢名將凡用兵之法敵人動息尚當知之豈有其主夜宿傳舍而軍中不知其斥候不明可想見矣周亞夫屯細栁天子先驅至不得入今乃使人晨入其卧內稱漢使者至麾召諸將易置其軍而猶不知信方起乃知獨漢王來大驚則其軍門壁壘蕩然無禁所謂紀律果安在邪設或敵人倣此而為之其敗亡可立而待也項羽死髙祖又襲奪其軍夫為將而其軍每為襲奪則真成兒戲爾信號能申軍法恐不應至是也平淮西碑誤唐憲宗以永貞元年八月即位是月劍南西川劉闢自稱留後十一月夏綏銀節度留後楊惠琳反元和元年三月辛巳楊惠琳伏誅十月戊子劉闢伏誅事皆在元和元年而退之平淮西碑云明年平夏又明年平蜀蓋誤也新唐書載此碑刪去明年平夏一句晉史書事鄙陋晉史書事鄙陋可笑者非一端如論阮孚好屐祖約好財同是纍而未判得失夫蠟屐固非雅事然特嗜好之僻爾豈可與貪財下俚者同日語哉而作史者必待客見其料財物傾身障簏意未能平方以分勝負此乃市井屠沽之所不若何足以汙史筆尚安論勝負哉許敬宗之徒汙下無識東坡以為人奴不為過也論姚崇序進郎吏姚崇序進郎吏明皇仰視殿屋崇再三言之終不應崇懼趨出髙力士侍側曰大臣奏事陛下當面加可否奈何一不省察帝曰朕任崇以天下事當進賢退不肖郎吏卑秩乃一一以煩朕耶會力士傳旨省中為道帝語崇乃喜聞者皆服帝識人君之體後之論史者亦美之豫謂明皇怠心已兆於此夫官吏雖有崇卑之異然一吏不肖則一事隳君相共議亦理之常不應以其微而忽之政使欲示信任之意亦當因是面加開諭使崇曉然於心豈宜傲睨峻拒忿然不答則是厭萬幾之繁畏惡之意已形於外不復顧省矣其後竟委政於李林甫専擅國柄付邊事於安祿山卒致大亂蓋胎於拒姚崇之時也􅏯錯名如字讀􅏯錯之名古今皆讀如措字潘嶽西征賦云越安陵而無譏諒惠聲之寂寞弔爰絲之正議仗梁劍於東郭訊景皇於陽丘爰信讒而矜謔殞吳嗣於局下蓋發怒於一博成七國之稱亂翻助逆以誅錯恨過聽之無討兹沮善而勸惡據此則乃如字讀而前輩初不然不知嶽何所據耶西漢句讀西漢極有好語患在讀者亂其句讀去聲如衛青傳云人奴之生得無笞罵足矣安得封侯事乎人奴之為一句生得無笞罵足矣為一句生讀如生乃與噲等為伍之生謂人方奴我平生得無笞罵已足矣安敢望封侯事則語有意味而句法雄健今人或以人奴之生為一句只移一字在上句便凡近矣西漢溝洫志西漢溝洫志載賈讓治河䇿云河從河內北至黎陽為石隄激使東抵東郡平岡又為石隄使西北抵黎陽觀下又為石隄使東北抵東郡津北又為石隄使西北抵魏郡昭陽又為石隄激使東北百餘里間河再西三東讀者多善其五用石隄字而不為冗復豫謂其源蓋出於禹貢自導河積石而下至九州攸同一段才二百餘字而用東至北至者凡三十餘皆連屬重復讀之初不覺其煩政如崇山峭壁先後崛立愈險愈竒班固蓋法此作史華實相副質勝文則野文勝質則史作史者當務華實相副須能摹寫當時情狀如在目前乃為盡善若惟務語簡則下筆之際必有沒其本意者如始皇見茅焦之時記事者書云王仗劍而坐口正沫出觀口正沫出四字則始皇鷙忍虎視之狀赫然可見矣作史之法當然也論季布季布面折廷爭欲斬樊噲殿上皆恐吕后罷朝遂不復議擊胸奴其剛直可知矣曹丘生數招權顧金錢事貴人趙談等與竇長君善布以書諫長君使勿與通其始固亦善矣及曹丘來見初無他説止進諂辭以悅之謂其得聲梁楚間欲遊揚其名於天下其姦佞取媚亦猶所以待趙談竇長君耳為布者當罵而弗與通如袁盎之絶富人可也顧乃大悅引為上客布至此何謬耶辨唐太宗臂鷂事通鑑載唐太宗嘗自臂鷂望見魏徴來納之懷徴奏事故久不已鷂竟死懷中按白樂天元和十五年獻續虞人針云降及宋璟亦諫玄宗溫顔聽納獻替從容及璟趨出鷂死握中故開元事播于無窮則是宋璟諫明皇非魏徴諫太宗也樂天在當時耳目相接必有據依殆史之誤抑豈二事皆然適相似耶五代典章五季承唐之後雖兵革相尋然去唐未逺制度典章人猶得以持循如蕭希甫論內宴樞密使不當坐李琪為僕射太常禮院言無送上之文馬縞趙咸議嫂叔之服崔稅以宰相改其所草制而引經固爭使當時人人能守唐制如此豈不能久立國乎老泉贊畫五星老泉贊吳道子畫五星云粧非今人唇傅黑膏豫常疑霄漢星辰之尊而粧飾乃如是之妖何也及觀唐五行志元和末婦人為圓髻椎髻不設鬢飾不施朱粉惟以烏膏注唇狀若悲啼乃悟唐之俗工作時世粧嫁名道子以紿流俗星辰不如是也痛飲讀離騷昔人有云痛飲讀離騷可稱名士世往往道其語豫常笑之方痛飲時天地一醉萬物同歸乃復攢眉於幽憂悲憤之作而顧稱名士耶張季鷹云使我有身後名不如即時一杯酒真達者之言也通鑑不載離騷邵公濟博著書言司馬文正公修通鑑時謂其屬范純父曰諸史中有詩賦等若止為文章便可刪去蓋公之意士欲立於天下後世者不在空言耳如屈原以忠廢至沈汨羅以死所著離騷淮南王太史公皆謂可與日月爭光豈空言哉通鑑并屈原事盡削去之春秋褒毫髮之善通鑑掩日月之光何耶公當有深識求於考異中無之豫謂三閭大夫以忠見放然行吟恚懟形於色詞揚巳露才班固譏其怨刺所著離騷皆幽憂憤歎之作非一飯不忘君之誼蓋不可以訓也若所謂與日月爭光者特以褒其文詞之美耳溫公之取人必考其終始大節屈原沈淵蓋非聖人之中道區區絺章繪句之工亦何足算也四六談麈差誤古今人作詩話多矣近世謝景思伋作四六談麈王性之銍作四六話甚新而竒前未嘗有此然談麈載陳去非草義陽朱丞相起復制云眷豫次輔方宅大憂有以宅憂為言者令貼麻陳改云方服私艱説者又以為語忌又云叔祖逍遙公謝顯道也初不入黨籍朱子發震內相以初廢錮乞依黨籍例命一子官伋為作謝啓云刻石刋章偶逃部黨按景思記此二事皆誤宅憂二字乃有旨令綦處厚貼麻去非曾待罪非令其自貼改也謝顯道崇寧元年入黨籍至四年立姦黨碑時出籍久矣一子得致仕恩僅監竹木務而卒故子發為請于朝復得一子官其奏牘云名在黨籍是也景思記當時所見偶爾差舛恐誤作史者采取故為是正之莊嶽齊地名孟子論齊語而曰引而置之莊嶽之間數年注莊嶽齊地也左傳襄公二十八年齊亂伐內宫弗克又陳於嶽注嶽里名也曹參為齊相屬後相曰以齊獄市為寄勿擾也獄字合從嶽音蓋謂嶽市乃齊闤闠之地姦人所容故當勿擾之耳梁溪漫志卷五
