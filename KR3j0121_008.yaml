body:
  text: 梁溪漫志卷八宋費衮撰蘇子美與歐陽公書蘇子美奏邸之獄當時小人借此以傾杜祁公范文正同時貶逐者皆名士姦人至有一網打盡之語獨韓魏公趙康靖論救之而不能回也其得罪在慶歷四年之十一月時歐陽公按察河北子美貽書自辨於公詞極憤激而集中不載今録於此以補史所遺者云舜欽再拜冬凛伏惟按部外起居安裕前月嘗拜書甚疏略必已通呈舜欽不曉世病蹈此禍機雖為知己者羞而內省實無所愧恐流言奉惑不避縷述自杜丈入相已來羣公日相攻謗非一端也九月末間嘗與子漸勝之邸中小飲之翰君謨見過勝之言論之間時有高處二諫因與之辨析本皆戲謔又無過言此亦吾曹常事不一二日朝中喧然以謂謗及時政吁可駭也故臺中奏疏趙祐怒二諫嘗論其不才故也天子辨其誣不下其削臺中鬱然不快無所泄憤因本院神會又意君謨預焉時君謨與赴會諸君同出館過邸門於是再削其削亦留中不出諸臺益忿重以穢瀆之語上聞列章牆進取必於君知二相膽薄畏事必不敢開口以辨既而起獄震動都邑又使刻薄之吏當之陶翼本憲長所舉中人追押席客皆翼之請也希望沽激深致其文枷掠妓人無所不至設有自誣者則席賔皆遭汙辱矣且進邸神會比年皆然亦嘗上聞蓋是公宴臺中謂去端闈不遠以𣙜貨務較之孰近𣙜務後邸中兩日作會甚盛若謂費用過當以商稅院比之孰多舜欽或非時為會聚集不肖則是可責也原叔濟叔輩皆當世雅才朝廷尊用之人因事燕集安足為過賣故紙錢舊已奏聞本院自來支使判署文記前後甚明况都下他局亦然不係諸處帳管比之外郡雜收錢豈有異也外郡於官地種物收利之類甚多下至糞土柴蒿之物往往取之以助筵會當時本惡於胥吏輩率醵過多遂與同官各出俸錢外更於其錢中支與相兼皆是祠祭燕會上下飲食共費之今以監主自盜定罪減死一等科斷使除名為民與貪吏掊官物入巳者一同始府中敕斷追兩官罰銅二十斤後六日府中復遣吏來取出身文字殊不曉閣下觀其事察其情豈當然乎舜欽雖不足惜為國計者豈不惜法乎自有他條不用私貸官物有文記準盜論不至除名判署者五匹杖九十其法甚輕審刑者自為重輕不由二府茍務快意壞亂典刑丁度怒京兆不逐之翰也二相恐栗畏縮自保其位心知非是不肯開言上有怒意皆不敢承當復令坐客因飲食被刑斥逐奔竄銜憤瀝血無人哀矜名辱身寃為讐者所快輦轂之下尚爾遠民寃濫孰肯更為辨之近者葛宗古滕宗諒張亢所用官錢巨萬復有入巳惟范公橫身當之皆得末減非范公私此三人於朝廷大體實有所補多矣國朝本以仁愛撫天下常用寬典今一旦臺中蓄私憾結黨繩小過以陷人審刑持深文以逞志傷本朝仁厚之風當塗者得不疾首而歎息也舜欽年將四十矣齒搖髮蒼才為大理評事廪祿所入不足充衣食性復不能與凶邪之人相就近今得脫去仕籍非不幸也自以所學教後生作商賈於世必未至餓死故當緘口遠遁不復更云但以遭此構陷纍及他人故憤悶之氣不能自平時復嶸􅗆於胸中一夕三起茫然天地間無所赴訴天子仁聖必不容姦吏之如此但舉朝無一言以辨之此可悲也掖垣諸君列章論館中人此自古未有唯趙叔平不署且有削極言辨之可重可重舜欽素為永叔奬愛故粗寫大槩幸觀過而見察也苦寒伏望保重不宣舜欽再拜歐陽公書其後云子美可哀吾恨不能為之言又聯書一行云子美可哀吾恨不能言蓋公已自諫省出矣豫近見子美墨迹一卷皆自書其所作詩行草爛然龍蛇飛動其中有獨酌一詩云一酌澆腸俗慮奔鷃微鵬大豈堪論楚靈當日能知此肯入滄江作旅魂卷尾題云慶歷乙酉十月書於姑蘇驛舍考其時蓋是被罪之明年居滄浪時所書其詩語間放曠達如此或謂流落幽憂以終非也陳少陽遺文陳少陽遺其家書南徐刻本以傳人多知之而其為文世所罕見胡蒼梧嘗得其跋蔡君謨茶録豫惜其流落不傳為載於此少陽跋云余聞之先生長者君謨初為閩漕時出意造密雲小團為貢物冨鄭公聞之歎曰此僕妾愛其主之事耳不意君謨亦復為此余時為兒聞此語亦知感慕及見茶録石本惜君謨不移此筆書旅獒一篇以進韓蘄王詞紹興間韓蘄王自樞密使就第放浪湖山匹馬數童飄然意行一日至湖上遙望蘇仲虎尚書宴客蘄王徑造其席喜甚醉歸翌日折簡謝餉以羊羔且作二詞手書以贈蘇公緘藏之親題其上云二闋三紙勿亂動淳熙丁未蘇公之子壽父山丞太府携以示蘄王長子莊敏公莊敏以示豫字畫殊傾欹然其詞乃林下道人語莊敏云先人生長兵間不解書晚年乃稍稍能之耳其一詞臨江仙云冬看山林蕭疏淨春來地潤花濃少年衰老與山同世間爭名利富貴與貧窮榮貴非干長生藥清間是不死門風勸君識取主人公單方只一味盡在不言中其一南鄉子云人有幾何般富貴榮華總是間自古英雄都如夢為官寶玉妻男宿業纒年邁衰殘鬢髮滄浪骨髓乾不道山林有好處貪歡只恐癡迷誤了賢世忠上烈女守節中興死節之士固不乏而女子守節者亦多有之洪鴻父羽之女適繁昌焦洧一日遇巨盜於江中欲逼之女義不受汙投江而死兩侍兒大曰宜恩小曰均奴姓吳氏女兄弟也俱有色藝亦相隨赴水死焦之甥徐伯遠傳其事竹坡周少隱為之賦二詩云就死由來不自疑玉顔那為賊鋒低了知今日投淵婦猶勝當年斷臂妻敵騎駸駸戰艦驕春江漫漫濕金翹但將紅袖供歌舞却為周郎笑二喬丁文簡公五世孫女世為鄭州新鄭縣人年十六嫁進士張晉卿靖康中與其夫避地大隗山冦至丁被擒挾之上馬丁投地以醜語詆之且曰我寧死耳誓不辱於汝輩也冦始亦不怒但屢扶上馬丁罵不已乃忿然瞋目遂絶於梃下晏元憲公四世孫女其父孝廣為鄧州南陽縣尉女小字師姑年十五從叔孝純官於廣陵建炎三年陷於敵係以北去每欲侵陵之輒擲身於地僵仆氣絶或自經或投於井皆救而獲免其主母愛之撫育如己出軍中爭傳誇焉又有陳氏女其父壽隆紹興初為湖北提刑卒於官其子造之挈妹至吳欲適吕丞相之子舟至焦山遇賊其家被害賊欲逼女力拒之大聲呼其嫂曰不如俱投江俾此身明白無為賊辱因躍入水死其尸浮數里不沒賊怒因撞以矛乃沒女時年十四洪氏事周少隱既賦詩關子東注亦寫之樂府丁晏二事則朱少章辨奉使歸奏之陳氏事則故老為豫言古今烈女史官不及知而湮滅無傳者何可勝數是以表而出之改德士頌宣和庚子改僧為德士一時浮屠有以違命被罪者獨一長老遽上表乞入道其辭有習蠻夷之風教忘父母之髮膚儻得回心而向道便更合掌以擎拳等語彼方外之人乃隨時迎合如此亦可怪也又一長老道行甚高或戲之曰戴冠兒穩否答曰幸有一片間田地此意甚微婉直以為遊戲耳時饒德操已為僧因作改德士頌云自知祝髮非華我故欲毁形從道人聖主如天苦憐憫復令加我舊冠巾舊説螟蛉逢蜾裸異時蝴蝶夢莊周世間化物渾如夢夢裏惺惺却自由德士舊嘗稱進士黃冠初不異儒冠種種是名名是假世人誰不被名謾衲子紛紛惱不禁倚松傳與法安心瓶盤叉釧形雖異還我從來一色金小年曾著書生帽老大當簪德士冠此身無我亦無物三教從來處處安英雄先見古之英雄智略相當其所以為勝負者無他正如奕棋特爭先法耳曹操赤壁敗歸道經華容地多蘆葦先使老弱踐之以過曰劉備智過人而見事遲若使人縱火吾屬無類矣王稽載范雎入秦值穰侯行郡邑雎匿車中穰侯果謂王稽曰謁君得無與諸侯客子俱來乎無益徒亂人國耳王稽曰不敢即别去范雎曰吾聞穰侯智士也其見事遲鄉者疑車中有人忘索之於是范雎下車走曰此必悔之行十餘里果使騎還索車中無客乃已且穰侯既疑有人當即索之投機之會間不容髮顧去而復來則已墮雎計中矣後人論曹操劉備之強弱穰侯范雎之成敗不必求諸他止觀此二事足矣樹稼靈佺誤唐會要開元二十九年冬十月京城寒甚凝霜封樹學者以為春秋雨木氷即是亦名樹介言其象介胄也寧王見而歎曰此所謂樹架者也諺云樹架達官怕必有大臣當之吾其死矣新唐書五行志記永徽年凝凍封樹引劉向語亦謂之樹介而舊唐書作樹稼白樂天樂府新豐折臂翁云君不見開元宰相宋開府不賞邊功防黷武注云開元初突厥數寇邊天武軍子將郝雲岑斬默啜獻首闕下自謂有不世之功時宋璟為相以天子好武恐徼功者生心痛抑其賞逾年始授郎將雲岑遂慟哭嘔血而死按此則名雲岑而舊唐書作靈儉新唐書作靈佺資治通鑑作靈荃考異中亦無之陸宣公裒方書陸宣公在忠州裒方書以度日非特假此以避禍蓋君子之存心無所不用其至也前輩名士往往能醫非惟衛生亦可及物而今人反恥言之近時士大夫家藏方或集驗方流布甚廣皆仁人之用心本草單方近已刻於四明然唐人及本朝諸公文集雜説中名方尚多未見有類而傳之者豫屢欲為之恨藏書不廣儻有能用豫言集以傳諸人亦濟物之一端也藥方傳人有蓄藥方之驗者可傳諸人得飲食之法者不可傳諸人非謂自珍口腹之奉也蓋傳人以藥則能衛生教人飲食則必傷生君子以仁存心故不當爾而世人有疾病得名方而愈者往往祕藏不肯示人至於烹物命以資匕筯一有適口則夸詫廣坐人人相效所殺不勝計其用心相反如此得無謬誤乎聞見後録論田橫邵公濟博著聞見後録云田橫居萬里海外高祖必欲其來不則發兵誅之四皓近在商山以高祖之暴而不能致蓋四皓振世之豪與高祖同高祖已帝則可隱矣故高祖全之非不能屈也大父康節云公濟之説如此豫竊以為不然方高帝時羣雄逐鹿惟田橫最得人心至從海島者五百人蹈死不變其得士可知矣髙帝汲汲欲其來萬里召之豈真有意於報賢人哉其意謂同心協力數百人萃於一國彼豈終帖帖者邪外以禮誘之終以兵脅之必使之死而後已此高帝本心也若夫四皓則高帝視之邈然其於進退初無益於漢之成敗當時逃秦人皆此徒耳漢初無輕重於其間也其後為太子羽翼適會高帝勢有不可又叔孫通之徒爭之力故子房倡為上素高此四人之語以遮當世耳目而邵氏獨以道里遠近為言又謂康節之説如此豈其然邪程文簡碑志聞見後録又云某公在章獻明肅后垂箔日密進唐武氏七廟圖后怒抵之地曰我不作負祖宗事仁皇帝解之曰某但欲為忠耳后既上賔仁皇帝每曰某心行不佳後竟除平章事蓋仁皇帝甚德而度不念舊惡故也自某公死某公為碑志極其稱贊天下無復知其事者矣某公受潤筆帛五千端云豫按潁濵龍川略志載進七廟圖乃程文簡也夫善惡之實公議不能掩所謂史官不記天下亦皆記之矣然程公墓志神道碑皆歐陽公所為凡碑志等文或被旨而作或因其子孫之請揚善掩惡理亦宜然至於是是非非則天下自有公論歐陽公一世正人而謂受潤筆帛五千端人不信也稱象出牛之智智之端人皆有之惟智過人者能發其端後人觸類而長之無所不可魏曹沖五六嵗有成人之智孫權曾致巨象曹操欲知其重沖曰置象大船之上而刻其水痕所至稱物而載之則校可知矣操大悅而行之本朝河中府浮梁用鐵牛八維之一牛且數萬斤治平中水暴漲絶梁牽牛沒於河募能出之者真定府僧懷丙以二大舟實土夾牛維之用大木為權衡狀鈎牛徐去其土舟浮牛出轉運使張燾以聞賜以紫衣此蓋因曹沖之遺意也士人祈間適有士人貧甚夜則露香祈天益久不懈一夕方正襟焚香忽聞空中神人語曰帝憫汝誠使我問汝何所欲士答曰某之所欲甚微非敢過望但願此生衣食粗足逍遙山間水濵以終其身足矣神人大笑曰此上界神仙之樂汝何從得之若求富貴則可矣豫因歷數古人極貴念歸而終不能遂志者比比皆是蓋天之靳惜清樂百倍於功名爵祿也蔡絛著書蔡絛姦人助其父為惡者也特以在兄弟間粗親翰墨且嘗上書論諫故在當時稍竊名著書甚多大抵以姦言文其父子之過此固不足怪至談叢所載其家佞幸濫賞可醜可羞之事反皆大書特書以為榮此乃竄南荒時所作至是猶不悟真小人而無忌憚者哉梁溪漫志卷八
