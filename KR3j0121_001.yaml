body:
  text: 梁溪漫志卷一宋費衮撰本朝殿閣建官本朝因殿建官今見於除拜者曰觀文曰資政曰端明觀文本舊延恩殿也慶歷七年以文明殿名犯真廟諡改為紫宸明年丁文簡罷政為紫宸殿學士御史何郯言紫宸不可為官稱於是改延恩為觀文殿置學士然明道初重建八殿皆易其名已改崇德為紫宸天和為觀文矣資政則自景德中王冀公罷政真宗特置資政殿學士以寵之至於端明則始於後唐明宗國初改殿為文明而學士仍領端明之職太平興國中併改學士為文明殿學士雍熙初又改文明殿為文德明道間改承明殿曰端明復置學士與文明之職並建後人改端明曰延和然迄無拜文明學士者蓋禁中已無此殿矣其實與端明本只一殿也此外又有集英殿止置修撰右文殿政和五年改集賢為右文始為集賢院則有學士洎建則易官為修撰矣政和四年改端明殿學士為延康殿學士樞密直學士為述古殿直學士五年置宣和殿學士宣和元年改宣和殿為保和建官亦同至建炎戊申復以延康為端明殿學士述古為樞密直學士保和之除則止於宣和之末自龍圖至煥章七閣皆藏祖宗謨訓與祕閣並建官均號貼職然祕閣有修撰而無待制學士惟天章閣初止除待制後亦遽止至今不除學士等官蓋難於稱呼與紫宸之意同也又有翰林侍讀學士侍讀學士自元豐廢而元祐復元符又廢至紹興六年范元長冲始除翰林侍讀學士班在翰林學士之下而恩數如之乾道末職制令刪去密學則八年一除胡承公世將至今亦闕不除宰輔㳂革國初宰相凡三員皆帶職首相為昭文館大學士次監修國史次集賢大學士皆平章事其後除拜不常至嘉祐時始只兩相元豐改官制宰相始不帶職而左僕射兼門下侍郎右僕射兼中書侍郎其後或兼或否又置左右丞以行參知政事之職政和初改左右㒒射為太少宰靖康復改太少宰為左右僕射建炎初以左右僕射並同中書門下平章事改門下侍郎中書侍郎為參知政事而廢左右丞至乾道末始改僕射為左右丞相蓋用漢制云廷魁入相自建隆至紹興末廷魁凡八十四人而入相者止六人吕文穆䝉正王文正曽李文定迪宋元憲庠何丞相㮚梁文靖克家而王李梁三相皆再入文穆凡三入云宰相出處本朝宰相出處之盛前輩備記之矣自中興至于淳熙戊申宰相二十八人再入者九人朱吕秦趙張湯陳史梁宋次道記趙中令以來未五十而相者六人而自建炎以來尤衆范丞相覺民登庸時才三十二張忠獻三十九秦忠獻四十二李丞相伯紀四十五其他未五十而相者比比可數也監修提舉國史祖宗時凡三相首相昭文次監修國史次集賢昭文雖首相始得之然但虛名獨監修國史有職事為重也若止除兩相則首相監修趙中令獨相以集賢監修久乃遷昭文薛文惠沈恭惠並相薛領監修而沈領集賢其後畢文簡冦忠愍亦然乾興元年令馮魏公專切提舉監修真宗實録於是又增提舉之名至天聖中詔王沂公監修先朝正史又别敕命之提舉於是監修提舉始分而為二職矣紹興初吕忠穆公再為首相差提舉修國史乞改命輔臣蓋是時但修日歷例指為國史而提舉日歷前此亦或命他官故忠穆引辭詔不允初監修之職自元豐王岐公以來久不以入銜至是始有提舉之命其後朱忠靖獨相監修趙忠簡張忠獻並相時范元長修史忠簡以親嫌乞改命忠獻監修忠獻引故事當命首相忠簡既罷忠獻始帶監修而秦忠獻獨相以監修兼提舉自是而後凡兩相則首相監修次相提舉或首相闕而次相已提舉則命參知政事權監修逮次相轉㕔則改充監修而命右相提舉或不拜右相則命參知政事權提舉相位皆虛則監修提舉悉以參政攝事云宰相父子襲爵吕文靖初封申公其子正獻亦封申韓忠獻初封儀公其子文定亦封儀本朝父子為相獨此兩家且襲其爵亦盛事也封國當避嘉祐中胡文恭公建言太宗封晉王至真宗封夀王乃升夀為大國在晉國之下景德三年詔夀宋梁趙四國自今不得更封而晉反不在禁封之科魏仁浦追封晉王冦準嘗曰晉是藩邸舊封今以為贈典非所宜天禧四年乃封丁謂為晉公蓋有司之過也陛下建國於升宜進為大國而與晉皆無得封從之然豫嘗考之真宗始封韓王而曹襄悼富文忠皆封韓公仁宗始封慶國公而王黼白時中皆封慶公紹興辛酉秦師垣轉㕔亦封慶公有司皆失於檢照也隆興元年十二月湯丞相轉㕔自榮國亦進封慶乃始辭避詔改封岐云三省勘當避諱舊制三省文字下部勘當本謂之勘㑹嘉祐末曾魯公當國省吏避其父名改為勘當至今沿襲省中出敕舊用準字輒去其下十字或云蔡京拜相時省吏亦避其父名然王禹玉父亦名準而冦萊公亦嘗作相不知書敕避諱自何時始也近年稍稍復舊樞密置使祖宗時樞密置使則有副使置知院則有同知院樞使知院二者未嘗並除熙寧元年七月陳秀公自大名入西府時文潞公吕惠穆為使韓康公邵安簡為副使神宗以秀公三至樞府欲稍重其禮乃以為知院事元樞並除自此始元豐四年以樞密聯職輔弼非出使之官止置知院同知院餘悉罷紹興丁巳正月詔宥密本兵之地用武之際事權宜重可依祖宗故事置樞密使副使其知樞密院事同知院簽書並仍舊於是秦忠獻以宰相入為樞密使自後除使者多自知院而遷至於副使則八年除王敏節庶十一年除嶽武穆飛自是久不除授矣都督宣撫等使名故事二府總師為宣撫使其次曰招討宣撫有副使有判官其次又有制置經制等使中興以來建使為多大者以宰相為御營使為都督或為宣撫兼處置使次相或執政為御營副使大將皆為方面宣撫使亦或為御營副使或招討使次為招撫使執政或從官為大帥者帶制置大使安撫大使有營田處帶營田大使從官亦或為招撫使都統制等官則或為都巡檢使或充某處捉殺盜賊制置使或止充捉殺使或裂數州或止一州為鎮撫使其名不一惟都督非宰相不除獨趙忠簡公知樞密院為之蓋初除川陕宣撫執政謂與蜀中諸帥使名無異乃亟改為都督紹興辛巳壬午命執政出使亦止為督視隆興癸未張忠獻亦以樞密使為都督然前為相時嘗督師矣明年湯丞相為都督楊武恭副之未幾就除都督前此未有蓋其官為太傅錫爵為王故特命之二府總師中興外攘之際以宰相執政總師建炎己酉二月首以吕忠穆公為同簽樞充江浙制置使是年五月張忠獻公以樞密同知為川陜京西湖北路宣撫處置使明年以京西湖北相去遼逺又已分鎮始全付以川陜之任紹興壬子四月忠穆以宰相都督江淮等路諸軍開府于鎮江未幾還闕以朱忠靖為同都督辭不拜乃以孟庾權同都督四年八月趙忠簡公以知樞密院為川陜宣撫處置使尋改都督川陜荆襄諸軍事將行而張忠獻公再入西府乃命忠獻行邊五年二月忠簡忠獻並相皆帶都督置司行在所忠獻復出蕩平湖冦六年正月又詔忠獻視師七月再視師以都督行府為名忠簡特居中總政事中外相應竟不復行也同知簽書虛位元豐官制樞密院之副有同知有簽書除授雖不皆同時然未嘗頻年虛位紹聖元年五月劉仲馮自簽書出知真定自是不除簽書政和元年九月王襄自同知出知亳州自是又不除同知宣和六年蔡懋始以同知副蔡攸凡同知虛位者十三年簽書虛位者三十年政和間童貫乃以宦寺為簽書然才三月遽躐為領院矣功臣號勳官唐文武臣有賜功臣號有勳官本朝因之自神宗不受尊號吳丞相冲卿因乞罷功臣號馮當世在西府亦言之遂詔管軍至諸軍班銜內帶功臣者並罷而勳官至政和中亦罷紹興六年執政議復舊制賜功臣號以示勸奬於是諸大將以次賜號惟勳官則自紹興癸丑始命禮部尚書洪擬翰林學士綦崈禮討論舊典甲寅嵗大理寺丞韓仲通繼以為言丙辰嵗廟堂又請武臣有邊功者帶勳以旌之下吏部立法至庚申嵗議者又以為言復下之有司八年間凡四議之然卒無賜勳者迄今惟外夷加恩則賜勳如故蓋國初檢校官憲銜與賜勳之類皆襲唐官職故不之改也大禮五使本朝郊祀五使沿唐及五代之制大禮使用宰相儀仗使用御史中丞頓遞使又增橋道之名用京尹禮儀使唐本以太常卿為之及鹵簿使則以學士及他尚書為之大中祥符中東封五使皆命輔臣以重非常之禮天聖二年親郊晏元獻以翰林學士為儀仗使薛簡肅以御史中丞為鹵簿使議者以為非故實治平二年當郊以賈直隭中丞為鹵簿使賈遂引故事以請乃以為儀仗使元符郊祀禮儀使以下改差執政官然自後五使自宰執外繼以從官之長或使相為之攝官典禮故事冬至祀圜丘攝太尉掌誓百官攝侍中進玉幣并奏請致齊及輦輅前奏請政和以左輔右弼易侍中中書令大禮行事以左輔攝事靖康詔三省長官並依元豐官制自是復初紹興癸丑上昭慈諡孟信安以攝太尉奉冊於是權太常少卿江端友言漢唐以來太尉乃三公之官故命宰相執政攝之以重其事政和以後降太尉不得為三公今雜壓乃在特進觀文殿大學士之下而奉册寶猶稱攝太尉自上攝下名實不相副兼不以三公奉册不應典禮遂詔今後攝三公行禮自是皆攝太傅乾道壬辰既改左右僕射為丞相刪去侍中中書尚書二令淳熙初復有詔侍中中書令雖已刪去每遇大禮並仍攝事貴存舊名以備禮文乙巳之冬舉行慶夀禮王魯公以首相攝太傅梁鄭公以次相攝侍中周益公以樞密使攝中書令重盛典也自是率遵行之時政記唐故事宰臣每於閣內及延英奏論政事退歸中書惟知印宰臣得書其日德音及凡宰臣奏事付史館名時政記其後議者謂所奏事非一端移數刻之久或但記出已之辭而忘同列之對恐有遺漏乞令宰臣人自為記國初以扈蒙之言詔盧多遜録時政月送史館然迄不能成書太平興國末直史館胡旦言五代自唐以來中書樞密皆置時政記周顯德中密院置內庭日厯望令樞密院依舊置內庭日厯詔自今軍國政要並委參知政事李昉撰録樞密院令副使一人纂集每季送史館昉因請每月先奏御後付所司時政記奏御自昉始端拱二年中書門下建言所録時政記緣御前殿樞密院以下先上宰臣未上所有宣諭無由聞知乞差副樞二人抄録送中書遂詔樞密副使張宏張齊賢共抄録送中書同修為一書以授史官然止送中書未得自為記也大中祥符五年王欽若陳堯叟在西府乃請别撰不附中書其後不止宰相與密院凡執政人人皆自為書而所記益廣然循襲一季之例或半年始送著作往往愆期妨於修撰紹興初始命每月終録送著作院云臺諫見政府祖宗時臺諫得見政府而不得自相往來如王沂公親諭韓魏公近日章疏甚好范文正公爭郭后面與吕許公辨吕獻可爭濮議面與韓魏公辨司馬溫公乞立皇子親見魏公納劄子張橫渠至中書見王荆公爭新法之類韓魏公問陳師道洙司馬近日論何事答以彼此臺諫不相往來不知所言何事是已其後臺諫得相往來而不得見政府吕汲公對簾前以備位執政不敢與言事官相通遂令范淳父諭㫖於劉器之是臺諫已不可見政府矣蘇子由王彥霖諸公擊吕吉甫㑹議于興國浴室院則臺諫相見無所拘也今沿襲此制云梁溪漫志卷一
