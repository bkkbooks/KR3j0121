body:
  text: 梁谿漫志卷九宋費衮撰劉高尚事劉高尚者濵州安定人家世爲農生九嵗不茹葷後稍稍不語問以事則書而對其語初若不可曉已而輙驗家人爲築别室以居久之言皆響應遠近以爲神聲聞京師徽宗三使往聘之辭疾不奉詔宣和間賜號高尚處士而建觀以居其徒因以其號名之靖康之擾棣人白其守使迎高尚守具安車邀之不至一日棄濵而來濵人大恐後二日濵州兵叛屠其城高尚至棣棣人喜守爲掃郵傳供帳以舍之高尚見之笑去乃卽城隅治舎水傍濵人或持金帛擕家室以就其廬者人往往笑之旣而敵騎大至城且陷人之死於兵者以萬數而火不及其居就之者果賴以免敵人見高尚皆下馬羅拜不敢入其里高尚嘗有言曰世之人以嗜欲殺身以貨財殺子孫以政事殺人以學問文章殺天下後世識者尊爲名言鏤板以傳竹坡周少隱旣爲之傳又推廣其言而爲之說曰此佛菩薩老聃莊周之徒所以救溺起死還真之論豈區區爲世俗言語文章者所能至哉夫畏塗者十殺一人則父子兄弟相戒必盛卒徒而後敢出焉至於衽席之上飲食之間其禍有甚於畏塗者而不知戒則是終不知嗜欲之能殺身矣黷貨嗜利之士食厚禄而取民財雖䘮亡之禍僅免其身而千金之産不足以供不肖子一醉之費人禍天殃不在其身而在其後則貨財豈不足以殺其子孫哉秦自商鞅之事孝公始用刑名而李斯之事始皇趙高之事二世皆以是道百年之閒天下之人不死於刑而死於兵蓋不知其幾千百萬桑𢎞羊開利說以中主欲不過欲自售一身而已禍流後世至唐宇文融皇甫鎛之徒皆用其說以取尊位而天下自是數蒙誅求之禍其殺人固無異於以挺與刄行政之弊一至於是豈不痛哉昔人有欲注周易與本草者或勸其注本草曰注本草誤不過殺一人注周易而誤則其禍道也大矣不然孟子之闢楊墨子雲之詆申韓退之之斥佛老其憂天下後世之意何其深且切哉後世斷章析句背正失理之學興其徒從而和之更相標牓迭相師授以盜名聲而取冨貴寖不可救豈非至人之前知知其必有斯禍而爲是說乎紫芝聞先生之言嘗私竊以爲嗜欲之殺身貨財之殺子孫與夫政事之殺人三者人猶得而知之若夫學問文章殺天下後世則周公孔子之言也先生農家子未嘗讀書事師而有是言豈神仙中之知道者乎此與夫熊經鳥伸吐故納新區區積嵗月之功而欲著名於仙籍者固有間矣事有専驗於一數天下事固莫不有數然士大夫或有終身専驗於一數者殆不可曉韓康公行第三發解過省殿試皆第三以元祐三年三月薨皆三數故蘇子容作挽詩云三登慶歴三人第四入熙寧四輔尊何清源第五㣲時從人筮窮達其人云公不第五何曰然其人拊掌大笑連稱竒絶因曰公凡遇五卽有喜慶何以熙寧五年鄕薦余中牓第五人及第五十五嵗隨龍崇寧五年拜相每遷官或生子非五年卽五月或五日其驗如此二事不知何故深於數者必能知之譚命近世士大夫多喜譚命往往自能推步有精絶者予嘗見人言日者閱人命蓋未始見年月日時同者縱有一二必倡言於人以爲異嘗略計之若生時無同者則一時生一人一日當生十二人以嵗計之則有四千三百二十人以一甲子計之止有二十五萬九千二百人而已今祗以一大郡計其户口之數尚不減數十萬况舉天下之大自王公大人以至小民何啻億兆雖明於數者有不能歴算則生時同者必不爲少矣其間王公大人始生之時則必有庻民同時而生者又何貴賤貧富之不同也此說似有理予不曉命術姑記之以俟深於五行者折衷焉江隂士人彊記江隂士人葛君㤀其名彊記絶人嘗謁郡守至客次一官人己先在意象軒驁葛敝衣子子來揖之殊不顧葛心不平坐良久謂之曰君謁太守亦有銜袖之文乎其人曰然葛請觀之其人素自負出以示葛疾讀一過卽以還之曰大好斯須見守俱白事畢葛復前曰某骩骳之文此官人竊爲已有適以爲贄者是也使君或不信某請誦之卽抗聲誦其文不差一字四座皆愕視此人且雜靳之其人出不意無以自解倉皇卻退歸而慙恚得疾幾死葛浮沈閭里閒家傍有民張染肆置簿書識其目葛嘗被酒偶坐其肆信手繙閱一夕民家火作凡所有之物并文書皆燼焉物主競來索數倍責償民無以質驗憂撓不知所出其子謀諸父曰吾聞里中葛秀才天性能記渠昨過吾家嘗閱此籍或能記憶盍以情扣乎卽日父子詣葛言其狀葛笑曰汝家張染肆且吾何從知其數邪民拜且泣葛又笑曰汝以壺酒來當能知之民喜亟歸擕酒殽至葛飲畢命取紙筆爲疏某月某日某人染某物若干某月某日某人染某物若干凡數百條所書月日姓氏名色丈尺無毫髪差民持歸呼物主讀以示之皆叩頭駭伏胡蒼梧記張文定諸公取相國寺前染簿各記十版此或出於用意故能黙識非若葛之無心而然信天禀記問不可及也邦人至今談其事云本草誤張文潛好食蟹晚苦風痺然嗜蟹如故至剔其肉滿貯巨桮而食之嘗作詩云世言蟹毒甚過食風乃乗風淫爲末疾能敗股與肱我讀本草書美惡未有慿筋絶不可理蟹續牢如絙骨萎用蟹補可使無騫崩凡風待火出熱甚風乃騰中炎若遇蟹其快如霜冰俗傳未必妄但恐殊愛憎本草起東漢要之出賢能雖失諒不遠堯跖終殊稱書生自信書俚說徒營營文潛爲此詩殆嗜蟹之癖而爲之辨邪抑真信本草也如河豚之目并其子凡血皆有毒食者毎剔去之其肉則洗滌數十過俟色如雪方敢烹故梅聖俞詩云烹炰茍失所入喉爲鏌鎁而大觀本草乃云河豚性温無毒所謂注本草誤而能殺人者殆此類邪張文潛粥記張文潛粥記贈潘邠老云張安道每晨起食粥一大盌空腹胃虛穀氣便作所補不細又極柔膩與腸腑相得最爲飲食之良妙齊和尚說山中僧每將旦一粥甚繫利害如或不食則終日覺臟腑燥渇蓋能暢胃氣生津液也今勸人每日食粥以爲養生之要必大笑大抵養性命求安樂亦無深遠難知之事正在寢食之閒耳或者讀之果笑文潛之說然予觀史記陽虛侯相趙章病太倉公診其脉曰法五日死後十日乃死所以過期者其人嗜粥故中藏實中藏實故過期師言曰安穀者過期不安穀者不及期由是觀之則文潛之言又似有證後又見東坡一帖云夜坐饑甚呉子野勸食白粥云能推陳致新利膈養胃僧家五更食粥良有以也粥旣快美粥後一覺尤不可說尤不可說著書稱謂古人文字間於輩行稱謂極嚴凡視予猶父者則名之馬大年嘗論退之作詩名籍徹而字東野則知東野乃其友而籍徹輩則弟子也大觀政和間有達官著書於歐陽叔弼蘇叔黨皆直名之如曰予見棐言又曰予見過當問之之類此達官於六一東坡旣非輩行以前輩著書之法觀之恐不當名其子也作字提筆法陳寺丞昱閒樂先生伯修之子也少好學書嘗於閒樂枕屏效米元章筆迹書少陵詩一日元章過閒樂見而驚焉閒樂命出拜元章卽使之書喜甚因授以作字提筆之法曰以腕著紙則筆端有指力無臂力也陳問曰提筆亦可作小楷乎元章笑因顧小史索紙書其所作進黼扆贊表筆畫端謹字如蠅頭而位置規橅皆若大字父子相顧歎服因請其法元章曰此無他惟自今以往毎作字時不可一字不提筆久久當自熟矣何祕監語蜀人何道夫祕監耕常言一切世間虛幻留之不住將之不去士大夫惟當做留得住將得去底事耳又云官不必高但願衣冠不絶而常爲士類家不必富但願衣食粗足而可以及人道夫平生香火禱祈毎及於此樂善者鏤版以傳其言道夫仕宦得廕子恩輙先及猶子旣殁三子澤皆不及已而德彦德固聯登淳熙丁未進士第紹熙庚戍德方亦決科識者知其爲善之報焉官户雜户律文有官户雜戶良人之名今固無此色人讞議者已不用此律然人罕知其故按唐制凡反逆相坐没其家爲官奴婢反逆家男女及奴婢没家皆謂之官奴婢男年十四以下者配司農十五以上者以其年長令遠京邑配嶺南爲城奴也一免爲番户再免爲雜户三免爲良人皆因赦宥所及則免之凡免皆因恩言之得降一等二等或直入良人諸律令格式有言官戶者是番户雜户之總號非謂别有一色蓋本於此惟揚澄江古今稱揚州爲惟揚蓋掇取淮海惟揚州之語然此二字殊無義理若謂可用則他州亦可稱惟徐惟青之類矣又多以江隂爲澄江意取謝元暉静如練之句然元暉作詩初不指此地而言也滁州環城多山故醉翁亭記首言環滁皆山也流俗至以環滁目是邦此尤可笑戚氏詞程子山敦厚舎人䟦東坡滿庭芳詞云予聞之蘇仲虎云一日有傳此詞以為先生作東坡笑曰吾文章肯以藻繪一香篆槃乎然觀其間如畫堂别是風光及十指露之語誠非先生肯云子山之說固人所共曉予嘗怪李端叔謂東坡在中山歌者欲試東坡倉卒之才於其側歌戚氏坡笑而頷之邂逅方論穆天子事頗摘其虛誕遂資以應之隨聲隨冩歌竟篇纔㸃定五六字坐中隨聲擊節終席不間他辭亦不容别進一語臨分曰足以爲中山一時盛事然予觀其詞有曰玉龜山東皇靈嫓統羣仙又云争解繡勒香韀又云鑾輅駐蹕又云肆華筵間作脆管鳴絃宛若帝所鈞天又云盡倒􅌦壺酒獻金鼎藥固大椿年又云浩歌暢飲回首塵寰爛漫遊玉輦東還東坡御風騎氣下筆真神仙語此等鄙俚猥俗之詞殆是教坊倡優所爲雖東坡竈下老婢亦不作此語而顧稱譽若此豈果端叔之言邪恐疑誤後人不可以不辨薛能詩野史雜說多有得之傳聞初未嘗攷究其實而相承以爲然者世傳秦宗權始爲薛能吏坐法笞背薛因唱云素脊鳴秋杖良久不繼因幕吏白事續云烏靴響暮㕔乃命決行其後宗權起兵首捕薛令舉前詩因又續云刄飛三尺雪白日落丈星遂害之按唐史廣明元年九月忠武大將周岌逐其節度使薛能能將奔襄陽亂兵追殺之先是軍未變秦宗權以許牙將調發至蔡聞能死許州亂託云赴難募蔡兵遂逐刺史據其城因以宗權爲蔡州刺史然則能死於許州時宗權自在蔡州安有聯詩被害之事邪雜說中如此類甚多殆不勝掊擊也陳子車殉𦵏檀弓陳子車死於衞其妻與其家大夫謀以殉塟定而後陳子亢至以告曰夫子疾莫養於下請以殉𦵏子亢曰以殉𦵏非禮也雖然則彼疾當養者孰若妻與宰得已則吾欲已不得已則吾欲以二子者之爲之也於是弗果用耶律德光之母述律左右有過者多送木葉山殺于阿保機墓隧中曰爲我見先帝於地下後以事怒大將趙思温使送木葉山思温辭不肯行述律曰汝先帝親信安得不往見之思温對曰親莫如后后何不行述律曰我本欲從先帝於地下以子幼國中多故未能也然可斷吾一臂以送之左右切諫乃斷其一腕而釋思温不殺此二事略同思温雖本中國人然武夫安識前言往行蓋理之所在有不約而同耳烏江項羽神和州烏江縣英恵廟其神蓋項羽也靈響昭著紹興辛巳敵犯淮南過廟下駐軍入致禱擲珓數十皆不吉怒甚取火欲焚其廟俄大虺見於神座聳身張口目光射人敵駭怖而出隨聞大聲發於廟後若數百人同時喑嗚叱咤者舉軍震恐卽移屯東去竟不敢宿其地云郡上其事於朝詔封神爲靈祐王邦人益嚴奉之二儒爲僧近世儒者絶意聲利飄然㳺方之外者有二人焉饒節字德操臨川人以文章著名曾子宣丞相禮爲上客陳了翁諸公皆與之遊往來襄鄧間始亦有婚宦意遇白崖長老與之語欣然有得嘗令其僕守舎歸見其占對異常怪而問之僕曰守舎無所用心聞隣寺長老有道價往請一轉語忽爾覺悟身心泰然無他也德操慨然曰汝能是我乃不能何哉徑往白崖問道八日而悟盡發囊槖與其僕祝髪爲浮屠德操名如璧僕名如琳遍㕘諸方陳了翁闗子開兄弟皆以詩稱美之至江浙樂靈隠山川因挂錫焉琳抱疾德操躬進藥餌旣卒盡送終之義後主襄陽天寧夏均父倪爲請疏其略云無復挾書更逐康成之後何憂成佛不居靈運之先又云豈惟江左公卿盡傾支遁獨有襄陽耆舊未識道安時稱其精當德操自號倚松道人所爲詩文皆高邁號倚松集云呉元中丞相之弟名叙字元常亦能詩有水竹清瘦霜松孤之句除南京敦宗院教授未赴忽棄官爲僧法名正光歴住萬年國清諸刹晚主衢之烏巨寺一子亦早夭其婦守志不嫁光年益老感疾婦必躬造飲饌以進積久不懈後元中丞相薨當家無人其祖母韓夫人奏乞元常歸故官詔許之元常迄不就凡住名刹四十年而終天生對前人記崔度崔公度王韶王子韶以爲的對紹興中馮侍郎檝羅侍御汝楫在朝或戲爲語曰侍郎侍御檝汝楫無能對者時范檢正同陳檢詳正同俱爲二府椽屬徐敦濟康續云檢正檢詳同正同時以爲天生此對也唐重氏族唐自太宗命高士亷等撰氏族志本惡山東人士崔盧李鄭自矜地望乃更以皇族爲首是亦自矜隴西著姓也然魏徵房元齡家皆盛與山東諸族爲婚由是舊望不減至顯慶中許敬宗等又升后族爲第一等於是益尚門閥諂諛之徒不稱人以官而呼之爲郎猶奴之事主蓋當時門地高者以此名爲貴重宋廣平呼張易之爲卿天官侍郎鄭杲謂宋曰中丞奈何卿五郎宋曰以官言之正當爲卿足下非張卿家奴何郎之有楊再思爲宰相而呼張昌宗爲六郎安禄山兼三鎮節度使而呼李林甫爲十郎裴坦之子勛至呼其父爲十一郎明皇不以天子爲貴而自呼爲三郎當時獻五角六張賦者亦呼其君爲三郎流弊可駭如此梁谿漫志卷九
