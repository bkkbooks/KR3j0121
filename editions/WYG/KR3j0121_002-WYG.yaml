body:
  text: 梁谿漫志卷二宋費衮撰文武官制文武官制自元豐政和更新其後增改亦不一因合而書之以備稽考云元豐三年初行文臣官制以階易官寄禄新格中書令侍中同平章事為開府儀同三司左右僕射為特進吏部尚書為金紫光禄大夫五曹尚書為銀青光禄大夫左右丞為光禄大夫元祐右銀青光禄大夫宣奉大夫大觀新置元祐左光禄大夫正奉大夫大觀新置元祐右光禄大夫六曹侍郎為正議大夫通奉大夫大觀新置元祐右正議大夫給事中為通議大夫左右諫議為太中大夫祕書監為中大夫中奉大夫大觀新置元祐左中散大夫光禄卿至少府監為中散大夫太常至司農少卿為朝議大夫奉直大夫大觀新置元祐右朝議大夫六曹郎中前行為朝請大夫中行為朝散大夫後行為朝奉大夫員外郎前行為朝請郎中行及起居舎人為朝散郎後行及左右司諫為朝奉郎左右正言太常國子博士為承議郎太常祕書殿中丞著作郎為奉議郎太子中允贊善大夫中舎洗馬為通直郎著作佐郎大理寺丞為宣德郎政和改宣教光禄衞尉寺將作監丞為宣義郎大理評事為承事郎太常寺大祝奉禮郎為承奉郎祕書省校書郎正字將作監主簿為承務郎崇寧初又因刑部尚書鄧洵武有請以留守節察判官換承直郎節度掌書記支使防團判官換儒林郎留守節察推官軍事判官換文林郎防團推官監判官換從事郎以録事㕘軍縣令為通仕郎以知録事㕘軍知縣令為登仕郎以軍廵判官司理司法司戸主簿尉為將仕郎五年改太廟郊社齋郎為假將仕郎政和六年又詔舊將仕郎已入仕不可稱將仕可為迪功郎舊登仕郎為修職郎舊通仕郎為從政郎尋又以假版官行於衰世始從版授葢非真官於是却以此三官易假授官以處未入仕者假將仕郎去假字為將仕郎假承務郎為登仕郎假承事承奉郎為通仕郎云政和二年易武選官名内客省使為通侍大夫延福宫使為正侍大夫宣正大夫政和六年増置履正大夫政和六年增置協忠大夫政和六年増置景福殿使為中侍大夫客省使為中亮大夫引進使為中衞大夫翊衞大夫政和六年増置親衞大夫政和六年増置四方館使為拱衞大夫東上閤門使為右武大夫正侍郎政和六年増置宣正郎政和六年増置履正郎政和六年増置協忠郎政和六年増置中侍郎政和六年増置客省副使為中亮郎引進副使為中衛郎翊衞郎政和六年増置親衞郎政和六年増置拱衛郎政和六年增置東上閤門副使為左武郎西上閤門副使為右武郎皇城使為武功大夫宫苑使左右騏驥使内藏庫使為武德大夫左藏庫使東作坊使西作坊使為武定大夫尋改武顯莊宅使六宅使文思使為武節大夫内團使洛苑使如京使崇儀使為武略大夫西京左藏庫使為武經大夫西京作坊使東西染院使禮賔使為武義大夫供備庫使為武翼大夫自皇城副使至供備庫副使為武功郎至武翼郎今呼武功大夫以下為正使武功郎以下為副使内殿承制為敦武郎淳熙改訓武内殿崇班為修武郎東頭供奉官為從義郎西頭供奉官為秉義郎左侍禁為忠訓郎右侍禁為忠翊郎左班殿直為成忠郎右班殿直為成義郎尋改保義三班奉職為承節郎三班借職為承信郎三班差使為進武校尉三班借差為進義校尉下至軍大將等易為副尉殿侍為下班祗應及更醫官名有差翰苑降詔故事近臣有所請乞辭免其從與違皆當令學士院降詔建炎掌故者省記凡請乞辭免惟不允者始降詔紹興初吕忠穆公乞二子任在外宫觀趙忠簡公謝任伯乞朝見並從所請而無詔書綦叔厚崈禮時為學士引故事論之取荆公内制荅富鄭公乞判汝州韓魏公乞判相州東坡内制荅文潞公吕正獻辭免拜安厚卿辭遷官諸允詔以為据從之尋又言近年急於除用人材並無降詔之禮乃或有如敢遷延重寘典憲指揮非待賢之道望舉行故事凡六尚書及翰林端明殿學士以上職任與曽任宰相執政官若自外除授或被召應赴行在者並令尚書省日下報學士院頒降詔書以示待遇之禮且使外任近臣有所取信以離其官守制可於是禮文稍稍復舊學士不草詔唐制惟給事中得封駮本朝富鄭公在西掖封還遂國夫人詞頭自是舎人遂皆得封繳元祐間東坡在翰林當草文潞公吕申公免拜不允批荅及安厚卿辭遷官宗晟辭起復詔皆以為未當不即撰進具所見以奏朝廷多從之葢學士實代王言視外制為重命令有所未韙舎人猶得繳還豈親為内相者顧乃不可固應執奏以示守官之義理則然爾知制誥不試而命歐陽公歸田録載知制誥不試而命者楊文公陳文惠及公凡三人蓋誤也實始於至道三年四月真宗念梁周翰夙負詞名令加奬擢乃不試而入西閤自國初以來不試而命者周翰實為之首而楊公繼之葉少藴左丞夢得避暑録話乃謂周翰與薛映梁鼎亦皆不試而用此亦誤映鼎葢與大年並命者獨大年不試而後命云學士帶知制誥翰林學士帶知制誥本於唐制唐自開元末改翰林供奉為學士院專掌内命號為内相凡充其職者無定員自諸曹尚書下至校書郎皆得與選入院一嵗則遷知制誥未知制誥者不作文書但備顧問㕘侍行幸而已唐自有知制誥以中書舎人或前行正郎為之本朝亦自有知制誥如錢若水蘇易簡皆自知制誥入為翰林學士然唐之學士必帶知制誥之三字者所以别其為作文書之學士也若本朝翰林學士未始有不作文書者則帶知制誥徒成贅爾元豐改官制失於删去况知制誥自掌外制天禧末欲罷冦忠愍政事召知制誥晏元憲示以除目元憲辭以臣掌外制此非臣職是也建炎元年謝任伯㕘政克家除翰林學士以知制誥犯祖名為言有㫖權不繫知制誥三字任伯力辭言翰林學士祖宗時若兼領他官止與職名同元豐官制既行專典内制則必帶知制誥三字此不易之制也詎可輒縁㣲臣輕有改革卒辭不拜然元豐以前省臺寺監皆領空名則固與職名同官制既行賜之以階而省臺寺監各還所職則翰林學士自應專典内制矣何必更帶知制誥三字為哉任伯第不詳攷爾北門西掖不以科第進北門西掖之除儒者之榮事也其有不由科第但以文章進者世尤指以為榮熙寧則韓持國崇寧則林彦振皆嘗直北門紹興初徐師川俯賜出身為翰林學士任世初申先蘇仲虎符皆賜出身為中書舎人而吕居仁本中賜出身兼掌内外制乾道淳熙以來韓无咎元吉王嘉叟秬劉正夫孝韙皆以門䕃特命攝西掖而劉正夫有召試之命因力辭言國朝之制詞命之臣皆先試而後命自渡江以來廢而不舉今方修故事恐弗克稱塞雖可其奏然攝詞命幾三年乃罷二史扈從二史立螭舊多服緑者謂之一㸃青其職曰記言記動則人主起居之際皆所當侍而遇乘輿行幸未嘗扈從此亦闕文近嵗始命起居郎起居舎人從駕乃合建官本意三館館職唐三館者昭文館史館集賢院是也五代卑陋僅於右長慶門築屋數十間為三館國初太平興國二年度地在昇龍門東北一新之以三館新修書院為崇文院大中祥符八年又於左右掖門外建院天禧初詔崇文外院以三館為額天聖九年乃徙三館于崇文院前列三館後建袐閣修史藏書校讎皆其職也中興以來復建袐書省而三館之職歸之開元故事校書官許稱學士本朝三館職事皆稱學士紹興初猶仍此稱葢舊典也秘書省官撰文字故事朝廷有合撰樂章贊頌敕𦵏軷祭文夏國人使到驛燕設教坊白語删潤經詞及回答髙麗書並送秘書省官撰葢學士代王言掌大典册此等瑣細文字付之館職既足以重北門之體且所以試三館翰墨之才異時内外制闕人多於此取之所謂館職儲材意葢本此檢校官檢校官葢唐制本以為武臣遷轉之階至祖宗時特崇重之凡文臣為樞宻使副必以檢校官兼正官為之大中祥符五年王兾公欽若以吏部尚書陳文忠堯咨以户部尚書為使晁文元當制誤削去檢校太傅詔並存之自後王景莊嗣宗曹襄悼利用為副樞又用趙韓王例不帶正官直以檢校太保為之獨太平興國中石元懿熙載止以戸部尚書充使乾興中錢思公惟演亦以兵部尚書為使當時以為有司之失檢校之階凡十有九三少而上有六等後雖樞廷不復帶然自節度使而遷者必除檢校官葢節鉞之上止有太尉開府儀同三司遂至少保所以必除檢校官者葢祖宗重惜名器之深意為之等級不肯輕畀以三孤之任也自檢校尚書而下亦或以為散官熙寧中祖無擇責授檢校工部尚書其後東坡黄州之貶亦檢校水部員外郎此比頗多百官諡命詞與否故事百官諡不命詞政和以來有不經太常考功議而特賜諡者始命詞紹興三年陳去非㕘政與義在西掖引故事以請乃詔今後特恩賜諡命詞給告餘給敕其後應太常考功定諡者亦徑陳乞賜諡例多命詞朝論以為言止坐議狀給告雖特恩得諡者亦然然今之從臣磨勘轉官尚應命詞特恩賜諡乃人主非常之澤所宜命詞以示褒寵若法應定諡者則當坐議狀給告可也至淳熙丁未陳魏公賜諡正獻梁鄭公賜諡文靖乃特詔命詞給告云文正諡諡之美者極於文正司馬溫公嘗言之而身得之國朝以來得此諡者惟公與王沂公范希文而已若李司空昉王太尉旦皆諡文貞後以犯仁宗嫌名世遂呼為文正其實非本諡也如張文節夏文莊始皆欲以文正易名而朝論迄不可此諡不易得如此其為厲世之具深矣臣下姓諡多同臣下諡多同蓋以節行適相當固難於相避然其間有姓諡皆同者往往稱謂紊亂嘗攷之本朝有兩王文康溥曙兩張文定齊賢方平兩張忠定詠燾兩陳忠肅瓘庭過兩劉忠肅摯珙兩李忠愍中官舜舉若水兩朱忠靖諤非勝兩王恭簡巗叟剛中而韓魏公諡忠獻韓宗魏諡忠憲趙閱道諡清獻趙挺之諡清憲字雖不同聲音亦相紊也外夷使入朝外夷使入朝所過郡長吏例送迎張安道鎮南京髙麗使經過公言臣班視二府不可為陪臣屈詔獨遣少尹其後韓玉汝鎮潁昌亦言交趾小國其使人將過臣境臣嘗備近弼難以抗禮按元豐中迓以兵官餞以通判使副府謁其犒設令兵官主之請如故事從之仍詔所過郡凡前宰相知判者亦如之蔣穎叔帥熙河西使卒于中國柩過其境官屬議奠拜穎叔獨曰生見尚不拜奈何屈膝向死者乃奠而不拜識者是之故事外夷國王來朝宰相出笏見之使者則否紹興初髙麗使入貢宰相乃出笏見之非故事時翟公㢲為㕘政嘗以為不可明年復入貢始檢㑹張安道例下之經由州郡云知軍州事太守謂之知某州軍州事者言一州之軍事州事無所不統也而或遇朝廷一時推行申嚴之事往往皆以繫銜如隄岸逓角之類彼既長是郡則一郡之事皆所當為似不須一一入銜也都㕔簽㕔州郡簽㕔舊謂之都㕔歐陽公尹師魯在錢思公幕中有都㕔閒話是也宣和辛丑尚書省公相㕔改為都㕔内外都㕔並行禁止懐安軍奏本軍都㕔乞以簽㕔為名從之詔諸路依此簽㕔之名所由始也謁刺熙豐間士大夫謁刺與今略同而於年月前加一行云牒件狀如前謹牒後見政宣間者則去此一行其間有僧官㕘監司亦只書實官如提刑宣德之類其末稱裁㫖此風尚淳古焉座主門生唐世極重座主門生之禮雖當五代衰亂典章隳壊之餘然故事相仍此禮猶不敢廢在唐知舉所放進士以己及第時名次為重和凝舉進士及第時第五其後知舉選范質為第五質後拜相封魯國公官至宫傅皆與凝同當時以為榮裴􅰥久在朝廷宰相馬裔孫桑維翰皆􅰥禮部所放進士也後裔孫知舉放榜引新進士詣􅰥􅰥喜作詩曰門生門下見門生世亦榮之維翰已作相嘗過􅰥􅰥不迎不送人問其故􅰥曰我見桑公於中書庶寮也桑公見我於私第門生也何送迎之有人亦以為當梁谿漫志巻二
