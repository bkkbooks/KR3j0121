body:
  text: 梁谿漫志巻六宋費衮撰成都大成殿成都大成殿建於東漢初平中氣象雄渾漢人以大隸記其修築嵗月刻於東楹至今千餘年巋然獨存殆猶魯靈光也紹興丙辰高宗因府學教授范仲殳有請親御翰墨書大成之殿四字賜之其後胡承公世將宣撫川陜治成都詣殿周視棟梁但爲易其太腐者增瓦數千而不敢改其舊云蜀中石刻東坡文字藁蜀中石刻東坡文字藁其改竄處甚多玩味之可發學者文思今具注二篇於此乞校正陸贄奏議上進劄子學問日新下云而臣等才有限而道無窮於臣字上塗去而字竊以人臣之獻忠改作納忠方多傳於古人改作古賢又塗去賢字復注人字智如子房而學則過改學字作文但其不幸所事暗君改所事暗君作仕不遇時德宗以苛察爲明改作以苛刻爲能以猜忌爲術而贄勸之以推誠好用兵而贄以消兵爲先好聚財而贄以散財爲急後於逐句首皆添注德宗二字治民馭將之方先冩馭兵二字塗去注作治民改過以應天變改作天道遠小人以除民害改作去小人以陛下聖明若得贄在左右則此八年之久可致三代之隆自若字以下十八字並塗去改云必喜贄議論但使聖賢之相契卽如臣主之同時昔漢文聞頗牧之賢改漢文聞三字作馮唐論取其奏議編冩進呈塗去編字却注稍加校正繕五字臣等無任區區愛君憂國感恩思報之心改云臣等不勝區區之意獲鬼章告裕陵文自孰知耘耔之勞而下云昔漢武命將出師而呼韓來廷効於甘露憲宗勵精講武而河湟恢復見於大中後乃悉塗去不用獷彼西𦍑改作憬彼西戎號稱右臂改作古稱非愛尺寸之疆改作非貪自不以賊遺子孫而下云施於冲人坐守成筭而董氊之臣阿里骨外服王爵中藏禍心與將鬼章首犯南川後乃自與將而上二十六字並塗去改云而西蕃首領鬼章首犯南川爰敕諸將改作申命諸將蓋酬未報之恩改作争酬生擒鬼章改作生獲其下一聮初云報谷吉之寃遠同彊漢雪渭水之耻尚陋有唐亦皆塗去乃用此二事别作一聮云頡利成擒初無渭水之耻郅支授首聊報谷吉之寃末句務在服近而柔遠改作來遠温公論碑誌温公論碑誌謂古人有大勲德勒銘鐘鼎藏之宗廟其葬則有豐碑以下棺耳秦漢以來始命文士襃贊功德刻之於石亦謂之碑降及南朝復有銘誌埋之墓中使其人果大賢耶則名聞昭顯衆所稱頌豈待碑誌始爲人知若其不賢也雖以巧言麗辭强加采飾徒取譏笑其誰肯信碑猶立於墓道人得見之誌乃藏於壙中自非開發莫之覩也蓋公剛方正直深嫉諛墓而云然予嘗思之藏誌於壙恐古人自有深意韓魏公四代祖葬於趙州五代祖葬於博野子孫避地歴祀綿遠遂忘所在魏公旣貴始物色得之而疑信相半乃命儀公祭而開壙各得銘志然後韓氏翕然取信重加封植而嚴奉之蓋墓道之碑易致移徙使當時不納誌壙中則終無自而知矣故予恐古人作事必有深意藉誌以諛墓則固不可若止書其姓名官職鄕里系以卒葬嵗月而納諸壙觀韓公之事恐亦未可廢也唐嚴火禁唐火禁嚴甚罪抵死元微之連昌宫詞叙覔念奴事云湏臾覔得又連催特敕街中許然燭街中然燭亦常事至特敕乃許則火禁之嚴可知然呉元濟拒命禁人偶語於途夜不然燭裴晉公旣平蔡遂弛其禁往來不限晝夜蔡人始知有生之樂而中朝之法亦嚴不知裴公弛禁之後當時又何以處此邪二唐論宰相唐質肅公嘗論文潞公燈籠錦而唐林夫坰嘗以新法彈王荆公後人文字間多誤謂父子論宰相爲唐氏一門盛事原其致誤之由蓋質肅之子淑問林夫之父彦猷詢俱嘗爲監察御史唐氏父子皆爲臺官則有之至論宰相則非出於一家也文字用語助文字中用語助太多或令文氣卑弱典謨訓誥之文其末句初無耶歟者也之辭而渾渾灝灝噩噩列於六經然後之文人多因難以見巧退之祭十二郎老成文一篇大率皆用助語其最妙處自其信然邪以下至幾何不從汝而死也一段僅三十句凡句尾連用邪字者三連用乎字者三連用也字者四連用矣字者七幾於句句用助辭矣而反覆出没如怒濤驚湍變化不測非妙於文章者安能及此其後歐陽公作醉翁亭記繼之又特盡紆徐不廹之態二公固以爲㳺戱然非大手筆不能也夏英公四六歐陽公歸田録載夏英公辭免奉使啟云義不戴天難下穹廬之拜禮當枕塊忍聞靺鞨之音歐陽公稱之其中又有一聯云王姬作館接仇之禮旣嫌曾子回車勝母之遊遂輟亦不減前語然是時文章方掃除五代鄙陋之習故此等語見稱於時自是而後四六之工蓋十倍於此矣翟忠恵四六翟公巽叅政汝文守越以擅免民間和買縑帛四十餘萬爲部使者所劾貶秩公謝表云欲安劉氏無嫌晁氏之危豈若秦人坐視越人之瘠迨去郡郡人安其政將相率投牒借留公知之命取其牘以來卽書其上云固知京兆姑爲五日之留無使稽山復用一錢之送其用事精當若此四六用事四六用事固欲切當然雕鐫太過則反傷正氣非出自然也國初有年八十二而魁大廷者其謝啟云白首窮經少伏生之八嵗青雲得路多太公之二年此語殆近乎俳近有士子年十有九以詩賦擢第予爲之作啟云年踰賈誼亦濫置於秀林齒少陸機顧何能於文賦蓋二者之年齒適相上下也呉丞相著書呉元中丞相敏宣和間著中橋見聞録記當時事不敢斥言大抵多爲廋語其稱安者謂蔡攸蓋攸字居安實者謂童貫才者謂林靈素或朱勔也他皆類是􅈸真子辨太公名馬大年永卿著􅈸真子録言前漢初去古未遠風俗質略故太公無名母媪無姓然唐宰相世系表叙劉氏所出云豐公生煓字執嘉生四子邦漢高帝也噫高皇之父漢史不載其名而唐史乃載之此事亦可一笑予謂風俗雖質略安有無姓之理母媪無姓特史逸之爾至於太公之名則漢史已具載按後漢章帝建初七年冬十月癸丑西廵狩幸長安丙辰祠高廟遂有事十一陵遣使者祠太上皇於萬年注太上皇高祖父也名煓一名執嘉歐陽公蓋本此特誤以執嘉爲字然太公之名初非唐史創書之也晉人言酒猶兵晉人云酒猶兵也兵可千日而不用不可一日而無備酒可千日而不飲不可一飲而不醉飲流多喜此言予謂此未爲善飲者飲酒之樂常在欲醉未醉時酣暢美適如在春風和氣中乃爲真趣若一飲徑醉酩酊無所知則其樂安在邪東坡和淵明飲酒詩序云吾飲酒至少常以把盞爲樂往往頺然坐睡人見其醉而吾中了然蓋莫能名其爲醉其爲醒也在揚州時飲酒過午輙罷客去解衣盤礴終日歡不足而適有餘因和淵明飲酒詩庻幾髣髴其不可名者東坡雖不能多飲而深識酒中之妙如此晉人正以不知其趣濡首腐脇顛倒狂迷反爲所累故東坡詩云江左風流人醉中亦求名此言真可以砭諸賢之肓也地里指掌圖今世所傳地里指掌圖不知何人所作其考究精詳詮次有法上下數千百年一覽而盡非博學洽聞者不能爲自足以傳遠然必託之東坡其序亦云東坡所爲觀其文淺陋乃舉子綴輯對䇿手段東坡安有此語最後有本朝陞改廢置州郡一圖乃有崇寧以後迄於建炎紹興所廢置者此豈出於東坡之手哉大觀廷䇿士大觀三年徽宗臨軒䇿士賜賈公安宅以下六百八十八人及第時方行三舎法先一嵗辟雍㑹試郡國貢士凡數千人其升諸司馬命於天子者僅百有四十人而吾州至三十有二人爲天下最其用他州户籍而登名者又不止是徽宗大喜命推賞守臣教官下詔曰學校興崇人材樂育法備令具勸懲已行深慮有司失實尚有遺材傳不云乎進賢受上賞蔽賢蒙顯戮閱前日賔興之數校其試中多寡惟常州爲衆茍依常格推恩非古人尚賞之意其知州教授特與轉一官於是知州事若蒙進官朝請大夫州學教授虙遷宣德郎諸生相與刻詔書於石而信安程子山俱爲之碑是牓晉陵張氏宰宷後改名宧宇無錫李氏上行端行兄弟皆中選初張氏崇寧中㕘政公守旣擢第至是三兄弟又同升而弟泰州通判實復以上舎試禮部中優等偶戾式被駁於是郡太守徐公伸取靈椿一株老丹桂五枝芳之句牓其閭曰椿桂坊是舉也邦人仕於朝者多知名宦達者踵相躡先大父諱肅亦是嵗貢士也高宗開大元帥府於鄆實在餽運幕中後駐蹕廣陵首召入館館罷歸隠錫山建炎末樞宻冨公直柔爲中執法以先大父及㕘政陳公與義中書舎人張公闕名論薦高宗記憶先大父姓名亟加収召二公旣赴闕並躋顯用而先大父獨不起㕘政張公守累書勉諭卒不行天下高之建炎召札今名儒鉅公嘉尚清節題䟦盈軸云青唐燕山邊費先大父有手記云余靖康丁未正月六日被隨軍漕檄差専一主管受給兵馬大元帥府犒軍金帛錢物二十萬貫匹兩因見梁正夫說収復燕山時童貫於瓦橋置司朝廷支一百萬貫匹兩犒軍曰降賜庫而河朔諸郡助軍之數不與焉是時吕元直爲河北轉運使以本司錢四十萬緡獻之貫顧吕公笑曰此甚㣲末公以爲功耶貫昨収復青唐時朝廷支降一千八百萬貫辟置官屬六百餘員每一次犒賞得金盂重五十兩比比皆是至結局第功上等轉五官陞五職其下增秩亦如之道鄕記毗陵後河吾州道鄕先生書郡中後河興廢曰郡城中所謂後河者乃舊守國子博士李公餘慶創開李公精地理誘率上户共成此河且曰自此文風寖盛士人相繼登高科三十年當有魁天下者爾之子孫咸有望焉河成未幾學者果盛已而紫㣲錢公公輔登第爲第三右丞胡公宗愈繼爲第二吏部余公中遂魁天下其去河成之日適三十年蓋熈寧癸丑也自後瀕河之民多侵岸爲屋及棄物水中由是堙塞久不通舟崇寧初年給事中朱公彦出守於此詢究利病得其實於是濬而通之向之形勝復出矣今給事中霍公端友遂於次年魁天下士是嵗嵗在癸未去熈寧癸丑適又三十年霍氏居河上㳺河勢曲折朝揖其門鍾聚秀氣世有名人今知太平州霍公漢英與其姪給事數十年間相望起東南爲時顯用然則形勝之助孰謂不可信乎李公葬州之橫山民病店者取其墳土服之輙愈今朝散郎撰乃其孫也右道鄕所記詳悉如此蓋有望於後之人是河自羅城南水門分荆溪之流經月斜金斗顧塘葛橋至於土橋以入於漕渠近嵗堙塞將成通衢矣至淳熈十四年林太守祖洽始復浚之江西長老紹興末江西一僧忘其名住饒州薦福寺寺傍舊多隙地寖爲人侵漁僧自度力不能制乃謂其徒曰寺有主者所以主張是寺也坐視地爲他人有而不能直焉用主者爲吾甚愧之今當去矣卽陞座鳴皷集衆高吟曰江南江北水雲鄕千頃蘆花未着霜好景不將零碎賣一時分付謝三郎遂閉目不語衆愕眙視之已逝矣石刻多失真石刻多失真者非惟摹搨肥瘠差謬而已至於刋造之際人但知深刻可以傳遠設若所書字本清勁鎸刻稍深則打成墨本紙必陷入洎裝褫旣平以書丹筆畫較之往往過元本倍蓰此大弊也歐陽公記李陽氷書忘歸臺銘等三碑比陽氷平生所篆最細痩世言此三石皆活嵗久漸生刻處幾合故細爾後之建碑者儻遇此等石則其失真尤可知矣唐藩鎮傳叙或云歐陽公取新唐書列傳令子叔弼讀而卧聽之至藩鎮傳叙歎曰若皆如此傳叙筆力亦不可及此恐未必然藩鎮傳叙乃全用杜牧之罪言耳政如項羽傳贊掇取賈生過秦論故竒崛可觀而非遷固之文也退之贈李愿詩退之贈李愿詩云往取將相酬恩讎夫得時得位而至將相平生所學政欲施用顧乃悻悻然爲酬恩讐設耶古人謂一飯之德必償睚眦之怨必報誠淺薄之論退之亦爲此言何也張橫浦讀書張侍郎九成謫南安病目執書倚柱向明而觀者凡十四年嵗月旣久塼上雙趺隠然洎北歸乃書此事於柱後人爲刻之楚詞落英王荆公有黄昏風雨滿園林籬菊飄零滿地金之句歐陽公曰百花盡落獨菊枝上枯耳因戯曰秋英不比春花落爲報詩人子細看荆公聞之引楚辭夕餐秋菊之落英爲据予按訪落詩訪予落止毛氏曰落始也爾雅俶落權輿始也郭景純亦引訪予落止爲注然則楚詞之意乃謂擷菊之始英者爾東坡戱章質夫寄酒不至詩云漫遶東籬嗅落英其義亦然米元章拜石米元章守濡湏聞有怪石在河壖莫知其所自來人以爲異而不敢取公命移至州治爲燕逰之玩石至而驚遽命設席拜於庭下曰吾欲見石兄二十年矣言者以爲罪坐是罷去其後竹坡周少隠過是郡見石而感之爲賦詩其略曰喚錢作兄真可憐喚石作兄無乃賢望塵雅拜良可笑米公拜石不同調云孟子之平陸孟子之平陸與其大夫言反復再四至言之齊王處然後盡出其姓名首尾相避森然簡嚴此文章之法也叵字叵字乃不可二合其義亦然史傳多連用叵可字蓋重出如安禄山傳叵可忍之類是也論書畫書與畫皆一技耳前輩多能之特游戱其間後之好事者争譽其工而未知所以取書畫之法也夫論書當論氣節論畫當論風味凡其人持身之端方立朝之剛正下筆爲書得之者自應生敬况其字畫之工哉至於學問文章之餘冩出無聲之詩玩其蕭然筆墨間足以想見其爲人此乃可寶而流俗不問何人見用筆稍佳者則珍藏之茍非其人特一畫工所能何足貴也如崇寧大臣以書名者後人往往唾去而東坡所作枯木竹石萬金争售顧非以其人而輕重哉蓄書畫者當以予言而求之梁谿漫志巻六
