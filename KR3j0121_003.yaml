body:
  text: 梁谿漫志卷三宋費衮撰入閤唐有入閤之制本朝因之按唐故事天子日御殿見羣臣曰常㕘朔望薦食諸陵寢有思慕之心不能御前殿則御便殿見羣臣曰入閤宣政前殿也謂之衙衙有仗紫宸便殿也謂之閤其不御前殿而御紫宸也乃自正衙喚仗由閤門而入百官俟朝于衙者因隨以入見故謂之入閤然衙朝也其禮尊閤宴見也其事殺自乾符巳後因亂禮闕天子不能日見羣臣而見朔望故正衙常日廢仗而朔望入閤有仗習見既久遂以入閤為重至出御前殿猶謂之入閤其後亦廢至唐明宗初即位御史中丞李琪請復朔望入閤然有司不能講正其事凡羣臣五日一入見中興殿便殿也此入閤之遺制而謂之起居朔望一出御文明殿前殿也反謂之入閤琪皆不能正故歐陽公譏之本朝建隆三年八月丙戍朔御崇元殿文武百官入閤自後屢踵而行之太平興國二年詔以八月一日入閤㑹雨而止又以入閤舊圖承五代草創禮容不備於是命史館修撰楊徽之等討論故事别為新圖淳化二年十二月丙寅朔遂行其禮於文德殿右諫議大夫張洎既與徽之等同撰定新儀又獨奏疏其略曰竊以今之乾元殿即唐之含元殿也在周為外朝在唐為大朝冬至元日立全仗朝萬國在此殿也今之文徳殿即唐之宣政殿也在周為中朝在漢為前殿在唐為正衙凡朔望起居及册拜妃后皇子王公大臣對四夷君長試制䇿舉人在此殿也今之崇德即唐之紫宸殿也在周為内朝在漢為宣室在唐為上閤即隻日常朝之殿也東晉太極殿有東西閤唐置紫宸上閤法此制也且人君恭己南面向明紫㣲黄屋至尊至重故廵幸則有大駕法從之盛御殿則有鈎陳羽衛之嚴故雖隻日常朝亦須立仗前代謂之入閤儀者葢隻日御紫宸上閤之時先於宣政殿前立黄麾金吾仗俟勘契畢喚仗即自東西閤門入故謂之入閤今朝廷且以文德正衙權宜為上閤甚非憲度竊見長春殿正與文德殿南北相對伏請改創此殿以為上閤作隻日立仗視朝之所其崇德殿崇政殿即唐之延英殿是也為雙日常時聽斷之所庶乎臨御之式允叶常經今輿論乃以入閤儀注為朝廷非常之禮甚無謂也臣又聞唐初五日一朝景雲初始修貞觀故事自天寳兵興之後四方多故肅宗而下咸隻日臨朝雙日不坐其隻日或遇大寒盛暑陰霪泥濘亦放百官起居雙日宰相當奏事即時特開延英召對或蠻夷入貢勲臣歸朝亦特開紫宸引見臣欲望依前代舊䂓隻日視朝雙日不坐其隻日遇大寒盛暑陰霪泥濘亦放百官起居其雙日於崇德崇政兩殿召對宰臣常㕘官以下及非時蠻夷入貢勲臣歸朝亦特開上閤引見並請凖前代故事處分奏入不報淳化三年五月甲午朔御文德殿百官入閤舊制入閤惟殿中省細仗隨兩省供奉官先入陳於庭太宗以為儀衞太簡命有司更設黄麾仗其殿中省細仗仍舊從新制也大中祥符七年四月令有司依新定儀制重畫入閤圖有唐朝職官悉改之從東上閤門從魏昭亮之請景祐元年二月知制誥李淑上時政十議其第十議乞修起入閤之儀寳元二年仁宗謂輔臣曰唐有入閤禮今不常行其久廢不講抑不可以行於今乎於是㕘知政事宋庠奏䟽曰比蒙聖問有唐入閤之儀今不常行臣退而討尋故事夫入閤乃有唐隻日於紫宸殿受常朝之儀也謹案唐有大内又有大明宫在大内之東北世謂之東内而謂大内為西内自髙宗以後天子多在大明宫制度尤為華備宫之正南曰丹鳳門門内第一殿曰含元殿大朝㑹則御之對北第二殿曰宣政殿謂之正衙朔望大册拜則御之又對北第三殿曰紫宸殿謂之上閤亦曰内衙隻日常朝則御之據唐制凡天子坐朝必須立仗於正衙殿或乘輿止御紫宸殿既喚仗自宣政殿兩門入是謂東西上閤門也若以國朝之制則今之宣德門唐丹鳳門也大慶殿唐含元殿也文德殿唐宣政殿也紫宸殿唐紫宸殿也今或欲求入閤本意施於儀典即須先立仗於文德殿之庭如天子止御紫宸殿即喚仗自東西閤門入如此則差與舊儀相合但今之諸殿比於唐制南北不相對值此為殊耳故後來論議因有未明又按唐自中葉以還雙日及非時大臣奏事别開延英若今假日御崇政延和是也乃知唐制每遇坐朝日即為入閤而叔世離亂五代草創大昕之制更從簡易正衙立仗因而遂廢其後或有行者常人之所罕見乃或謂之盛禮甚不然也今之相傳入閤圖者是官司記常朝之制也如閤門有儀制敕雜坐圖耳是何足為希濶之事哉况唐開元舊禮本無此制至開寳中諸儒増附新禮始載月朔入閤之儀又以文德殿為上閤差舛尤甚葢當時編撰之士討求未至太宗朝儒臣張洎亦有論奏頗為精洽竊恐朝廷他日修復正衙立仗欲下兩制使預加商𣙜以正舊儀而議者以今之殿閤與唐不同遂不果行至熈寧三年五月壬子用宋敏求王岐公等議始詔朔望御文德殿立仗而罷入閤儀入閤之本末如此元祐黨人吾州蒼梧先生胡德輝珵嘗對劉元城歎息張天覺之亡元城無語蒼梧疑而問之元城云元祐黨人只是七十八人後來附益者不是又云今七十七人都不存惟某在耳元城為此言時實宣和六年十月六日也葢紹聖初章子厚蔡亰卞得志凡元祐人皆籍為黨無非一時忠賢七十八人者可指數也其後每得罪於諸人者駸駸附益入籍至崇寧間京悉舉不附己者籍為元祐姦黨至三百九人之多於是邪正混殽其非正人而入元祐黨者葢十六七也建炎紹興間例加褒贈推恩其後而議者謂其間多姦邪今日子孫又從而僥倖恩典遂有詔甄别之行卷前輩行卷之禮皆與刺俱入葢使主人先閱其文而後見之宣和間蒼梧胡德輝見劉元城尚仍此禮近年以來率俟相見之時以書啟面投大抵皆求差遣匄私書干請乞憐之言主人例避謝而入袖退閱一二見其多此等語往往不復終卷彼方厭其干請安得為之延譽士之自處既輕而先達待士之風至此亦掃地矣氏族氏族之譌久矣凡蔣邢茅胙祭周公之𦙍也此三者實一姓也自分為三𣲖寖逺寖忘則為三姓矣退之所謂徐與秦俱出韓與何同姓之類是也揚子雲於蜀無他揚今此揚姓不復見亦皆雜於楊矣錢鏐有吴越吴越之人避其諱以劉去偏傍而為金王審知據閩閩人避其諱以沈去水而為尤二姓實一姓也今之稱複姓者皆從省文如司馬則曰馬諸葛則曰葛歐陽則曰歐夏侯則曰侯鮮于則曰于如此之類甚多相承不已複姓又將混於單姓矣唐永貞元年十二月淳于姓改為于以音與憲宗名同也至今二于無復可辨如豆盧葢唐大族欽望瑑革皆嘗為相而此姓今不復見其殆混於盧邪王文貞壻入蜀王文貞公為相長女壻韓忠憲例當守逺郡得洋州公私語其女曰韓郎入川汝第歸吾家勿憂也吾若有求於上他日使人指韓郎縁婦翁奏免逺適則其為損不細矣忠憲聞之喜曰公待我厚也予竊謂王公此舉於當國則甚公於處家則似未盡且婦從夫者也死生禍福率當同之今其夫特為逺郡遽俾其女歸享安佚之樂而使其夫獨被遐征之勞豈所以教為婦之道哉唐李晟正嵗崔氏女歸寧責曰爾有家而姑在堂婦當治酒食且以待賔客即卻之不得進晟武人尚知此為公計者政使其女不肯逺適尤當以義責使偕行使人知公雖父子之愛亦不肯容其私益彰至公之道則於為國處家之際兩盡其至矣司馬温公讀書法司馬温公獨樂園之讀書堂文史萬餘巻而公晨夕所常閱者雖累數十年皆新若手未觸者嘗謂其子公休曰賈豎藏貨貝儒家惟此耳然當知寶惜吾每嵗以上伏及重陽間視天氣晴明日即設几案於當日所側羣書其上以曝其腦所以年月雖深終不損動至於啟卷必先視几案潔浄藉以茵褥然後端坐看之或欲行看即承以方版未嘗敢空手捧之非惟手汗漬及亦慮觸動其腦每至看竟一版即側右手大指面襯其沿而覆以次指面撚而挾過故得不至揉熟其紙每見汝輩多以指爪撮起甚非吾意今浮屠老氏猶知尊敬其書豈以吾儒反不如乎當宜誌之髙宻辭起復文選載李令伯乞養親表云臣宻今年四十有四祖母劉今年九十有六是臣盡節於陛下之日長報劉之日短也讀者惻然動心元祐三年髙宻郡王宗晟起復判大宗正事連章力辭其言亦曰念臣執喪報親之日短致命徇國之日長東坡時直禁林當草荅詔見其䟽而哀之因入劄子乞聽所守詔從之范淳父字范淳父内翰之母夢鄧禹來而生淳父故名祖禹字夢得温公與之帖云按鄧仲華傳仲華内文明篤行淳備輒欲更表德曰淳備既協吉夢又可止訛且與令德相應未審可否次日復一帖云昨夕再思淳備字太顯而盡不若單字淳臨時配以甫子而稱之五十則稱伯仲亦猶子路或稱季路是也如何如何予因是推之劉仲原父貢父錢穆父皆只一字或謂仲原父用程伯休父三字之法非也伯休父亦只一字耳葢伯仲與甫之類本語助特後世以便於稱謂非以表其徳也凡今以伯仲甫子之類為助者皆取單字葢亦古之遺意焉爾射鴈堂閒樂先生陳公伯修師錫在太學與了翁友善一日同集宗室淄王圃中有鴈陣過相與戲曰明年魁天下者當中首鴈伯修引弓射之一矢中其三了翁不中須臾又有鴈陣過焉了翁射之亦中其三伯修笑曰公其後牓耶了翁曰果然當為公代其明年徐鐸榜伯修果以第三人登第後三年了翁登第亦第三人皆為昭慶軍節度掌書記果相與為代因名便㕔為射鴈堂先是了翁將唱第問投子山道者云我作狀元否應曰無時一有時三了翁惘然莫測是嵗時彦魁天下了翁居其三始悟前語閒樂異事閒樂陳公伯修宣和三年以祠官居南徐一日書寢夢至一處殿宇巍然中有人冠服如天帝正坐侍衛環列贊者引公拜殿下命之升殿慰藉久之謂曰卿平生論事章䟽可悉録以進呈公對曰臣在杭州日因陳正彚事郡守賈偉節遣人搜取多已焚滅今恐不能盡記帝曰能記者録以進即有仙官導公至廡下幕中設几案筆硯有一青册公方沉吟間僊官曰不必追記盡在是矣開册示之則平日所草章䟽具在雖經焚毁者亦備載無遺公即䄂以進帝喜曰已安排卿第六等官矣遂覺呼其子大理寺丞昱至前引其手按其項則十字裂如小兒䪿其熱如火謂之曰與吾書謁刺數十將别親舊吾去矣其子請曰大人何往公告以夢子曰此吉夢其殆有歸詔耶公曰不然豐相之臨終亦夢朝帝葢永歸之兆也已而再寢頃之覺復謂其子曰適又夢入黑漆屋三間此棺槨之象吾去必矣俄南徐太守虞純臣遣人招其子告之曰適尊公有狀丐掛冠正康彊何乃爾莫測其意是以扣公言未既聞傳呼陳殿院來若已知其故者謂太守曰死生定數也公何訝戒其子曰凡吾治命事不可妄易遂歸㩦親戚數十人酌酒告別既退命諸子子婦皆坐置酒諄諄告戒家人見公無疾而遽若是愕眙不知所荅迨夜入寢有婢杏香奔告諸子曰殿院咳逆不止若疾狀諸子亟走至則已趺坐而一足猶未上命其子為收之纔畢而終終之七日忽有僧欲入弔其家以素不之識止之僧云我誠不識公但疇昔之夜在𤓰洲忽夢一官人着朱騎馬導從甚盛凌波而北人馬皆不濡傍人指云此陳殿院也洎入城見羣僧來作佛事乃知之故欲瞻敬遺像非有所求也時名流多作挽詩紀其事黄冕仲裳云不須更草玉樓記已作仙官第六人張子韶九成云凌波應作水中仙葢謂此乃知世之偉人皆非混混流轉者傅說騎箕而為列星其可信矣元城了翁表章今時士大夫論四六多喜其用事精當下字工巧以為膾炙人口此固四六所尚前輩表章固不廢此然其剛正之氣形見於筆墨間讀之使人聳然人主為之改容姦邪為之破膽元符末劉元城自貶所起帥鄆當過闕公謝表云志惟許國如萬折之而必東忠以事君雖三巳之而無慍坐是遂不得入見大觀間陳了翁在通州編修政典局取尊堯集了翁以表繳進其語有云愚公老矣益堅平險之心精衛眇然未捨填波之願後竟再坐貶此二表於用事下字亦皆精切而氣節凛凜如嚴霜烈日與退之所謂登泰山之封鏤白玉之牒者似不侔矣王定國記東坡事王定國甲申雜記云天下之公論雖讎怨不能奪李定鞫治東坡獄正急一日將朝忽於殿門謂同列曰蘇軾誠竒才也衆莫敢對定曰雖二三十年前所作文字詩句引證經傳隨問即荅無一字差舛誠天下之竒才也此恐未必然按東坡自熙寧初荆公行新法自是詩語多及新法之不便元豐二年言者論其作詩譏諷遂得罪相距止十年耳不至二三十年也籍使能記二三十年作詩文之因人皆可能似不足為東坡道也定國記此特愛東坡之過云爾梁谿漫志卷三
